<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPB — Government Deconstruction</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas { cursor: pointer; border-radius: 8px; }
  .hint {
    margin-top: 12px;
    font-size: 0.8rem;
    color: #555;
    text-align: center;
  }
</style>
</head>
<body>

<canvas id="c" width="900" height="600"></canvas>
<div class="hint" id="hint">Click the sphere to deconstruct</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const W = 900, H = 600;

const GOLD = '#d4af37';
const BLUE = '#62a4d0';
const BG = '#0d0d1a';
const PANEL = '#1a1a2e';

// --- States ---
const IDLE = 0, JITTER = 1, SPLIT = 2, DONE = 3;
let state = IDLE;
let stateT = 0; // time within current state

// --- Spheres ---
const mainSphere = { x: W / 2, y: H / 2, r: 90, label: 'Government', color: GOLD };

const childSpheres = [
  { x: W / 2 - 160, y: H / 2, r: 70, label: 'Branches', color: GOLD, targetX: W / 2 - 160 },
  { x: W / 2 + 160, y: H / 2, r: 70, label: 'Jurisdictions', color: BLUE, targetX: W / 2 + 160 },
];

// --- Drag state ---
let dragging = null; // index into childSpheres
let dragOffX = 0, dragOffY = 0;

// --- Jitter params ---
const JITTER_DURATION = 0.8; // seconds
const SPLIT_DURATION = 0.7;

// --- Drawing ---
function drawSphere(x, y, r, color, label, alpha) {
  if (alpha < 0.01 || r < 1) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Glow
  const glow = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.4);
  glow.addColorStop(0, color + '33');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  // Sphere gradient
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grad.addColorStop(0, lighten(color, 60));
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, darken(color, 40));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Rim
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Highlight
  ctx.beginPath();
  const hlGrad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.35, r * 0.05, x - r * 0.25, y - r * 0.35, r * 0.4);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.arc(x - r * 0.25, y - r * 0.35, r * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Label
  const fontSize = Math.max(12, r * 0.28);
  ctx.font = '700 ' + fontSize + 'px Segoe UI, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 4;
  ctx.fillText(label, x, y);

  ctx.restore();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, r - amt);
  g = Math.max(0, g - amt);
  b = Math.max(0, b - amt);
  return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}

function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

// --- Render loop ---
let lastTime = 0;

function render(now) {
  const dt = lastTime ? (now - lastTime) / 1000 : 0;
  lastTime = now;

  // Background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();

  // Title
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.font = '400 13px Segoe UI, system-ui, sans-serif';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  ctx.fillText('Visual Deconstruction', W / 2, 30);
  ctx.restore();

  if (state === IDLE) {
    // Breathing animation
    const breathe = Math.sin(now / 600) * 4;
    drawSphere(mainSphere.x, mainSphere.y, mainSphere.r + breathe, mainSphere.color, mainSphere.label, 1);

  } else if (state === JITTER) {
    stateT += dt;
    const progress = Math.min(1, stateT / JITTER_DURATION);

    // Jitter: random offset that intensifies then calms
    const intensity = Math.sin(progress * Math.PI) * 12;
    const jx = (Math.random() - 0.5) * intensity * 2;
    const jy = (Math.random() - 0.5) * intensity * 2;

    // Sphere color flickers
    const flicker = Math.random() > 0.5 ? GOLD : '#e8c547';
    drawSphere(mainSphere.x + jx, mainSphere.y + jy, mainSphere.r, flicker, mainSphere.label, 1);

    // Crack lines appear
    if (progress > 0.3) {
      ctx.save();
      ctx.globalAlpha = (progress - 0.3) * 1.4;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(mainSphere.x - 5 + jx, mainSphere.y - mainSphere.r * 0.6 + jy);
      ctx.lineTo(mainSphere.x + 3 + jx, mainSphere.y + jy);
      ctx.lineTo(mainSphere.x - 8 + jx, mainSphere.y + mainSphere.r * 0.5 + jy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mainSphere.x + 10 + jx, mainSphere.y - mainSphere.r * 0.4 + jy);
      ctx.lineTo(mainSphere.x - 2 + jx, mainSphere.y + mainSphere.r * 0.2 + jy);
      ctx.stroke();
      ctx.restore();
    }

    if (progress >= 1) {
      state = SPLIT;
      stateT = 0;
      // Initialize child positions at center
      childSpheres[0].x = mainSphere.x;
      childSpheres[0].y = mainSphere.y;
      childSpheres[1].x = mainSphere.x;
      childSpheres[1].y = mainSphere.y;
    }

  } else if (state === SPLIT) {
    stateT += dt;
    const progress = Math.min(1, stateT / SPLIT_DURATION);
    const ease = easeOutBack(progress);

    // Fade out main sphere
    const mainAlpha = 1 - easeInOut(Math.min(1, progress * 3));
    if (mainAlpha > 0) {
      drawSphere(mainSphere.x, mainSphere.y, mainSphere.r * (1 - progress * 0.5), mainSphere.color, mainSphere.label, mainAlpha);
    }

    // Burst particles at start
    if (progress < 0.4) {
      ctx.save();
      ctx.globalAlpha = (0.4 - progress) * 2;
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const dist = progress * 200;
        const px = mainSphere.x + Math.cos(angle) * dist;
        const py = mainSphere.y + Math.sin(angle) * dist;
        const pr = 3 - progress * 6;
        if (pr > 0.5) {
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fillStyle = i % 2 === 0 ? GOLD : BLUE;
          ctx.fill();
        }
      }
      ctx.restore();
    }

    // Move children outward
    childSpheres[0].x = mainSphere.x + (childSpheres[0].targetX - mainSphere.x) * ease;
    childSpheres[1].x = mainSphere.x + (childSpheres[1].targetX - mainSphere.x) * ease;

    const childAlpha = easeInOut(Math.min(1, progress * 2));
    const childR = childSpheres[0].r * Math.min(1, ease);
    drawSphere(childSpheres[0].x, childSpheres[0].y, childR, childSpheres[0].color, childSpheres[0].label, childAlpha);
    drawSphere(childSpheres[1].x, childSpheres[1].y, childR, childSpheres[1].color, childSpheres[1].label, childAlpha);

    if (progress >= 1) {
      state = DONE;
      hint.textContent = 'Drag the spheres to explore';
    }

  } else if (state === DONE) {
    // Draw connection line
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.setLineDash([8, 8]);
    ctx.lineDashOffset = -now / 80;
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(childSpheres[0].x, childSpheres[0].y);
    ctx.lineTo(childSpheres[1].x, childSpheres[1].y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // "was" label at center
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.font = '400 12px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.fillText('Government', (childSpheres[0].x + childSpheres[1].x) / 2, (childSpheres[0].y + childSpheres[1].y) / 2 - 10);
    ctx.restore();

    // Draw child spheres with breathing
    const breathe = Math.sin(now / 700) * 3;
    childSpheres.forEach(s => {
      drawSphere(s.x, s.y, s.r + breathe, s.color, s.label, 1);
    });
  }

  requestAnimationFrame(render);
}

// --- Interaction ---
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height)
  };
}

function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

canvas.addEventListener('click', function(e) {
  if (state !== IDLE) return;
  const pos = getMousePos(e);
  if (dist(pos.x, pos.y, mainSphere.x, mainSphere.y) < mainSphere.r) {
    state = JITTER;
    stateT = 0;
    hint.textContent = '';
  }
});

canvas.addEventListener('mousedown', function(e) {
  if (state !== DONE) return;
  const pos = getMousePos(e);
  for (let i = childSpheres.length - 1; i >= 0; i--) {
    if (dist(pos.x, pos.y, childSpheres[i].x, childSpheres[i].y) < childSpheres[i].r) {
      dragging = i;
      dragOffX = childSpheres[i].x - pos.x;
      dragOffY = childSpheres[i].y - pos.y;
      canvas.style.cursor = 'grabbing';
      return;
    }
  }
});

canvas.addEventListener('mousemove', function(e) {
  const pos = getMousePos(e);

  if (dragging !== null) {
    childSpheres[dragging].x = pos.x + dragOffX;
    childSpheres[dragging].y = pos.y + dragOffY;
    return;
  }

  // Hover cursor
  if (state === IDLE) {
    canvas.style.cursor = dist(pos.x, pos.y, mainSphere.x, mainSphere.y) < mainSphere.r ? 'pointer' : 'default';
  } else if (state === DONE) {
    let over = false;
    childSpheres.forEach(s => {
      if (dist(pos.x, pos.y, s.x, s.y) < s.r) over = true;
    });
    canvas.style.cursor = over ? 'grab' : 'default';
  }
});

canvas.addEventListener('mouseup', function() {
  dragging = null;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseleave', function() {
  dragging = null;
  canvas.style.cursor = 'default';
});

// Touch support
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const pos = getMousePos(touch);

  if (state === IDLE) {
    if (dist(pos.x, pos.y, mainSphere.x, mainSphere.y) < mainSphere.r) {
      state = JITTER;
      stateT = 0;
      hint.textContent = '';
    }
  } else if (state === DONE) {
    for (let i = childSpheres.length - 1; i >= 0; i--) {
      if (dist(pos.x, pos.y, childSpheres[i].x, childSpheres[i].y) < childSpheres[i].r) {
        dragging = i;
        dragOffX = childSpheres[i].x - pos.x;
        dragOffY = childSpheres[i].y - pos.y;
        return;
      }
    }
  }
});

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (dragging !== null) {
    const pos = getMousePos(e.touches[0]);
    childSpheres[dragging].x = pos.x + dragOffX;
    childSpheres[dragging].y = pos.y + dragOffY;
  }
});

canvas.addEventListener('touchend', function() {
  dragging = null;
});

// Start
requestAnimationFrame(render);
</script>

</body>
</html>
