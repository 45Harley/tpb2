function buildTimeline() {
  const leftEl = document.getElementById('timeline-left');
  const rightEl = document.getElementById('timeline-right');
  leftEl.innerHTML = ''; rightEl.innerHTML = '';

  // Act I → left panel, Act 0/2/3 → right panel

  TIMELINE_PHASES.forEach(p => {
    const panel = (p.act <= 2) ? leftEl : rightEl;
    // Add act header when act changes
    if (p.act !== lastAct && p.act > 0) {
      const hdr = document.createElement('div');
      hdr.className = 'tl-act-label';
      hdr.textContent = ['', 'Act I: Founding', 'Act II: Friction', 'Act III: Enablement', 'Act IV: The Future'][p.act];
      hdr.style.color = ACT_COLORS[p.act];
      panel.appendChild(hdr);
      lastAct = p.act;
    }
    const node = document.createElement('div');
    node.id = 'tl-' + p.id;
    node.className = 'tl-item';
    node.textContent = p.label;
    node.addEventListener('click', () => jumpToPhase(p.id));
    panel.appendChild(node);
  });
  timelineBuilt = true;
}

function jumpToPhase(targetId) {
  // Reset all animation state
  floatingWords = []; nebulae = []; particles = [];
  spheres = []; townBalls = []; stateBalls = []; leafSpheres = [];
  closingQueued = false; dragging = null; waitingForClick = false;
  hintEl.textContent = ''; narrationEl.textContent = '';
  lastTimelinePhase = '';

  // Rebuild seeds from scratch (so Act II phases have seeds to sprout)
  seeds = [];
  SEED_DEFS.forEach(def => seeds.push(makeSeed(def)));

  // Mark seeds as popped for phases we're skipping past
  const idx = TIMELINE_PHASES.findIndex(p => p.id === targetId);
  const SEED_POP_ORDER = [
    { phase: 'friction-civil-war', label: 'Slavery', dropChild: true },
    { phase: 'friction-robber-barons', label: 'Property over People', dropChild: false },
    { phase: 'friction-suffrage', label: 'Men Only', dropChild: false },
    { phase: 'friction-civil-rights', label: 'Inequality', dropChild: false },
  ];
  SEED_POP_ORDER.forEach(sp => {
    const spIdx = TIMELINE_PHASES.findIndex(p => p.id === sp.phase);
    if (spIdx <= idx) popSeed(sp.label, sp.dropChild);
  });

  // Set up people ball for phases that need it
  peopleBall = makeBall(W / 2, H / 2, 90, 'The People', GOLD);

  // If jumping to interactive, we need the deconstruct tree
  if (targetId === 'interactive') {
    const root = makeInteractiveSphere(DECONSTRUCT_TREE, W / 2, H / 2, 95);
    spheres.push(root);
  }

  phase = targetId;
  phaseT = 0;
  logDwell(phase);
}

let lastTimelinePhase = '';
function updateTimeline(currentPhase) {
  if (!timelineBuilt) buildTimeline();
  if (currentPhase === lastTimelinePhase) return;
  lastTimelinePhase = currentPhase;
  const currentIdx = TIMELINE_PHASES.findIndex(p => p.id === currentPhase);
  TIMELINE_PHASES.forEach((p, i) => {
    const node = document.getElementById('tl-' + p.id);
    if (!node) return;
    node.classList.remove('active');
    if (p.id === currentPhase) {
      node.classList.add('active');
      node.style.background = ACT_COLORS[p.act] + '44';
      node.style.borderColor = ACT_COLORS[p.act];
    } else if (i < currentIdx) {
      node.style.color = '#aaa';
      node.style.background = '#1a1a2e';
      node.style.borderColor = 'transparent';
    } else {
      node.style.color = '#666';
      node.style.background = 'transparent';
      node.style.borderColor = 'transparent';
    }
  });

let claudiaVoice = null;
function pickVoice() {
  const v = speechSynthesis.getVoices();
  claudiaVoice = v.find(x => /female/i.test(x.name) && /en.US/i.test(x.lang))
    || v.find(x => /zira|eva|samantha|karen|susan/i.test(x.name))

}
speechSynthesis.onvoiceschanged = pickVoice;

let ttsPlaying = false;

  if (!audioEnabled) { ttsPlaying = false; return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);

  if (claudiaVoice) u.voice = claudiaVoice;
  ttsPlaying = true;
  u.onend = () => { ttsPlaying = false; };
  u.onerror = () => { ttsPlaying = false; };
  speechSynthesis.speak(u);
}

// ========================================
function drawSphere(x, y, r, color, label, alpha, showPlus) {
  if (alpha < 0.01 || r < 1) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Glow
  const glow = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.4);
  glow.addColorStop(0, color + '33');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  // Sphere body
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grad.addColorStop(0, lighten(color, 60));
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, darken(color, 40));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, r * 0.025);
  ctx.stroke();

  // Highlight
  const hlGrad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.35, r * 0.05, x - r * 0.25, y - r * 0.35, r * 0.4);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.beginPath();
  ctx.arc(x - r * 0.25, y - r * 0.35, r * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Label — supports multi-word wrapping for long labels
  if (label && r > 8) {
    const words = label.split(' ');
    let lines;
    // Wrap if label is too long for sphere
    if (words.length > 1 && ctx.measureText && label.length > 10 && r < 100) {
      const mid = Math.ceil(words.length / 2);
      lines = [words.slice(0, mid).join(' '), words.slice(mid).join(' ')];
    } else {
      lines = [label];
    }
    const fontSize = Math.max(8, Math.min(r * (lines.length > 1 ? 0.24 : 0.28), 18));
    ctx.font = '700 ' + fontSize + 'px Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#1a1030';
    ctx.shadowColor = 'rgba(255,255,255,0.25)';
    ctx.shadowBlur = 2;
    const lineH = fontSize * 1.2;
    const startY = y - (lines.length - 1) * lineH / 2;
    lines.forEach((line, li) => {
      ctx.fillText(line, x, startY + li * lineH);
    });
    ctx.shadowBlur = 0;

    if (showPlus) {
      ctx.font = '700 ' + (fontSize * 0.65) + 'px Segoe UI, system-ui, sans-serif';
      ctx.globalAlpha = alpha * 0.45;
      ctx.fillText('+', x, y + r * 0.45);
    }
  }

  ctx.restore();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return '#' + [Math.min(255, Math.round(r + amt)), Math.min(255, Math.round(g + amt)), Math.min(255, Math.round(b + amt))]
    .map(c => c.toString(16).padStart(2, '0')).join('');
}
function darken(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return '#' + [Math.max(0, Math.round(r - amt)), Math.max(0, Math.round(g - amt)), Math.max(0, Math.round(b - amt))]
    .map(c => c.toString(16).padStart(2, '0')).join('');
}
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }
function lerp(a, b, t) { return a + (b - a) * t; }
function drawLeaf(lx, ly, size, angle, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(lx, ly);
  ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size*0.5, -size*0.8, size, -size*0.3, size*0.9, 0);
  ctx.bezierCurveTo(size, size*0.3, size*0.5, size*0.8, 0, 0);
  ctx.fill();
  ctx.strokeStyle = darken(color, 30);
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size * 0.8, 0);
  ctx.stroke();
  ctx.restore();
}

function drawGrid() {
  ctx.save();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
  for (let gy = 0; gy < H; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  ctx.restore();
}

function drawTitle(text, alpha) {

// Particles
let particles = [];
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.6 + Math.random() * 0.4, age: 0, color, r: 2 + Math.random() * 2 });
  }
}
function updateParticles(dt) {
  particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.age += dt; p.vx *= 0.97; p.vy *= 0.97; });
  particles = particles.filter(p => p.age < p.life);
}
function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - p.age / p.life) * 0.7;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (1 - p.age / p.life), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ========================================
// FLOATING WORDS
// ========================================
let floatingWords = [];

function makeWord(label, positive, color) {
  const edge = Math.floor(Math.random() * 4); // 0=top,1=right,2=bottom,3=left
  let x, y, vx, vy;
  if (edge === 0) { x = Math.random() * W; y = -20; vx = (Math.random()-0.5)*10; vy = 5+Math.random()*7; }
  else if (edge === 1) { x = W+20; y = Math.random()*H; vx = -(5+Math.random()*7); vy = (Math.random()-0.5)*10; }
  else if (edge === 2) { x = Math.random()*W; y = H+20; vx = (Math.random()-0.5)*10; vy = -(5+Math.random()*7); }
  else { x = -20; y = Math.random()*H; vx = 5+Math.random()*7; vy = (Math.random()-0.5)*10; }
  return {
    label, positive, color, x, y, vx, vy,
    alpha: 0, targetAlpha: 1,
    fontSize: positive ? 16 + Math.random()*8 : 15 + Math.random()*7,
    phase: 'entering', // entering | drifting | winning | shrinking | seeding
    life: 0,
    pulseOffset: Math.random() * Math.PI * 2,
  };
}

function updateWords(dt) {
  floatingWords.forEach(w => {
    w.life += dt;
    // Drift toward center if positive, slow down if negative
    if (w.positive && (w.phase === 'drifting' || w.phase === 'winning')) {
      w.vx += (W/2 - w.x) * 0.08 * dt;
      w.vy += (H/2 - w.y) * 0.08 * dt;
    }
    // Attacking words — drift toward center aggressively
    if (w.attacking && (w.phase === 'drifting' || w.phase === 'entering')) {
      const atkForce = w.positive ? 0.06 : 0.12; // positive words already have 0.08 drift
      w.vx += (W/2 - w.x) * atkForce * dt;
      w.vy += (H/2 - w.y) * atkForce * dt;
      // Check proximity to government sphere center — melt when close
      const d = Math.sqrt((w.x - W/2)**2 + (w.y - H/2)**2);
      if (d < 110 && w.phase !== 'melting') {
        w.phase = 'melting';
        w.meltT = 0;
        spawnParticles(w.x, w.y, w.color, 6);
      }
    }
    // Repulsion — words push each other apart so they don't clump (skip orbiting words)
    if (!w.orbiting) floatingWords.forEach(other => {
      if (other === w) return;
      const dx = w.x - other.x, dy = w.y - other.y;
      const distW = Math.sqrt(dx*dx + dy*dy) || 1;
      if (distW < 80) {
        const force = (80 - distW) * 0.02;
        w.vx += (dx / distW) * force;
        w.vy += (dy / distW) * force;
      }
    });
    // Damping
    w.vx *= 0.99; w.vy *= 0.99;
    w.x += w.vx * dt; w.y += w.vy * dt;

    // Phase transitions
    if (w.phase === 'entering') {
      w.alpha = Math.min(1, w.life * 2);
      if (w.life > 0.5) w.phase = 'drifting';
    } else if (w.phase === 'drifting') {
      w.alpha = w.targetAlpha;
    } else if (w.phase === 'winning') {
      w.alpha = 0.8 + Math.sin(w.life * 4 + w.pulseOffset) * 0.2;
      w.fontSize = Math.min(w.fontSize + dt * 2, 28);
    } else if (w.phase === 'shrinking') {
      w.alpha = Math.max(0, w.alpha - dt * 1.5);
    } else if (w.phase === 'melting') {
      w.meltT += dt;
      w.alpha = Math.max(0, 1 - w.meltT * 2);
      w.fontSize *= (1 - dt * 0.5); // shrinks
      w.vx *= 0.9; w.vy *= 0.9; // slows to a stop
    }
  });
  // Remove fully melted words
  floatingWords = floatingWords.filter(w => w.phase !== 'melting' || w.alpha > 0.02);
}

function drawWords() {
  floatingWords.forEach(w => {
    if (w.alpha < 0.02) return;
    ctx.save();
    ctx.globalAlpha = w.alpha;
    ctx.font = (w.positive ? '700 ' : '400 ') + w.fontSize + 'px Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // Glow
    ctx.shadowColor = w.color;
    ctx.shadowBlur = w.positive ? 12 : 14;
    ctx.fillStyle = w.color;
    ctx.fillText(w.label, w.x, w.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

// ========================================
// SEEDS — dormant ideas at canvas edges
// ========================================
let seeds = [];

const SEED_DEFS = [
  { label: 'Tyranny', color: '#ff6666', seedX: 60, seedY: H-20, sproutPhase: null, childSeed: null },
  { label: 'Slavery', color: '#ff5555', seedX: 150, seedY: H-18, sproutPhase: 'swirl-civil-war',
    childSeed: { label: 'Inequality', color: '#ff7777', seedX: 180, seedY: H-22, sproutPhase: 'swirl-civil-rights', childSeed: null }},
  { label: 'Property over People', color: '#ffaa55', seedX: 300, seedY: H-20, sproutPhase: 'swirl-robber-barons', childSeed: null },
  { label: 'Men Only', color: '#ffbb77', seedX: 450, seedY: H-18, sproutPhase: 'swirl-suffrage', childSeed: null },
  { label: "King's Rule", color: '#ff8888', seedX: 600, seedY: H-20, sproutPhase: null, childSeed: null },
  { label: 'Landed Gentry', color: '#ffcc88', seedX: 750, seedY: H-18, sproutPhase: null, childSeed: null },
];

function makeSeed(def) {
  return {
    label: def.label, color: def.color,
    x: def.seedX, y: def.seedY,
    r: 4, alpha: 0, targetAlpha: 0.3,
    state: 'dormant', // dormant | falling | sprouting | popped
    sproutPhase: def.sproutPhase,
    childSeed: def.childSeed,
    sproutT: 0,
  };
}

function dropSeed(wordObj) {
  const def = SEED_DEFS.find(d => d.label === wordObj.label);
  if (!def) return;
  const seed = makeSeed(def);
  seed.x = wordObj.x; seed.y = wordObj.y; // start at word position
  seed.state = 'falling';
  seeds.push(seed);
}

function updateSeeds(dt) {
  seeds.forEach(s => {
    if (s.state === 'falling') {
      s.y += 60 * dt;
      s.alpha = Math.min(s.targetAlpha, s.alpha + dt * 0.5);
      const def = SEED_DEFS.find(d => d.label === s.label);
      if (def && s.y >= def.seedY) {
        s.y = def.seedY; s.x = def.seedX;
        s.state = 'dormant';
      }
    } else if (s.state === 'dormant') {
      s.alpha = s.targetAlpha + Math.sin(Date.now()/1000 + s.x) * 0.08;
    } else if (s.state === 'sprouting') {
      s.sproutT += dt;
      s.r = 4 + s.sproutT * 25;
      s.alpha = Math.min(0.7, 0.3 + s.sproutT * 0.3);
      // Reach toward government sphere at center
      const dx = W/2 - s.x, dy = H/2 - s.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      s.x += (dx / d) * 35 * dt;
      s.y += (dy / d) * 35 * dt;
      if (s.sproutT > 2.5) s.state = 'popped';
    }
  });
}

function drawSeeds() {
  seeds.forEach(s => {
    if (s.alpha < 0.02 || s.state === 'popped') return;
    ctx.save();
    ctx.globalAlpha = s.alpha;
    // Ember glow
    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 2.5);
    glow.addColorStop(0, s.color + '88');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle = s.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    // Growing red word inside the sprouting blob — reaching for government
    if (s.state === 'sprouting') {
      const labelSize = Math.min(22, 8 + s.sproutT * 8);
      const labelAlpha = Math.min(1, s.sproutT * 0.6);
      ctx.save();
      ctx.globalAlpha = labelAlpha;
      ctx.font = '700 ' + labelSize + 'px Segoe UI, system-ui, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = s.color;
      ctx.shadowColor = s.color; ctx.shadowBlur = 15;
      ctx.fillText(s.label, s.x, s.y);
      ctx.restore();
    }
    ctx.restore();
  });
}

function sproutSeedsForPhase(phaseName) {
  seeds.forEach(s => {
    if (s.state === 'dormant' && s.sproutPhase === phaseName) {
      s.state = 'sprouting'; s.sproutT = 0;
    }
  });
}

function popSeed(label, dropChild) {
  const s = seeds.find(sd => sd.label === label);
  if (!s) return;
  s.state = 'popped';
  spawnParticles(s.x, s.y, s.color, 8);
  if (dropChild && s.childSeed) {
    const child = makeSeed(s.childSeed);
    child.x = s.x; child.y = s.y; child.state = 'falling';
    seeds.push(child);
  }
}

// ========================================
// NEBULA BLOBS — fuzzy idea clusters
// ========================================
let nebulae = [];

function makeNebula(x, y, r, color, label) {
  return {
    x, y, r, color, label, alpha: 0,
    targetX: x, targetY: y, targetR: r,
    lobes: Array.from({length: 5}, () => ({
      angle: Math.random() * Math.PI * 2,
      dist: 0.3 + Math.random() * 0.5,
      size: 0.4 + Math.random() * 0.4,
      speed: 0.3 + Math.random() * 0.4,
    })),
    phase: 'forming', // forming | stable | condensing
    life: 0,
  };
}

function updateNebulae(dt) {
  nebulae.forEach(n => {
    n.life += dt;
    if (n.phase === 'forming') {
      n.alpha = Math.min(0.6, n.life * 0.3);
      n.r = n.targetR * Math.min(1, n.life * 0.5);
      if (n.alpha >= 0.6) n.phase = 'stable';
    } else if (n.phase === 'condensing') {
      n.x = lerp(n.x, n.targetX, dt * 1.5);
      n.y = lerp(n.y, n.targetY, dt * 1.5);
      n.r = Math.max(10, n.r - dt * 30);
      // Lobes shrink as it condenses
      n.lobes.forEach(l => { l.dist = Math.max(0.05, l.dist - dt * 0.3); l.size = Math.max(0.1, l.size - dt * 0.2); });
    }
  });
}

function drawNebulae(now) {
  nebulae.forEach(n => {
    if (n.alpha < 0.02) return;
    ctx.save();
    ctx.globalAlpha = n.alpha;

    // Core cloud
    const coreGrad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    coreGrad.addColorStop(0, n.color + '44');
    coreGrad.addColorStop(0.6, n.color + '22');
    coreGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = coreGrad;
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();

    // Undulating lobes (layered sine-wave approximation of organic edges)
    n.lobes.forEach(l => {
      const lx = n.x + Math.cos(l.angle + now/1000 * l.speed) * n.r * l.dist;
      const ly = n.y + Math.sin(l.angle + now/1000 * l.speed) * n.r * l.dist;
      const lr = n.r * l.size;
      const lobeGrad = ctx.createRadialGradient(lx, ly, 0, lx, ly, lr);
      lobeGrad.addColorStop(0, n.color + '33');
      lobeGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = lobeGrad;
      ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2); ctx.fill();
    });

    // Label
    if (n.label && n.r > 20) {
      ctx.globalAlpha = n.alpha * 0.8;
      ctx.font = '400 14px Segoe UI, system-ui, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ddd';
      ctx.shadowColor = n.color; ctx.shadowBlur = 6;
      ctx.fillText(n.label, n.x, n.y);
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  });
}

// ========================================
// LAYOUT — organized, bigger spheres
// ========================================

// Towns: 3 rows of ~4-5, centered, bigger radius
function scatterTowns() {
  townBalls = [];
  const cx = W / 2, cy = H / 2;
  const cols = 5;
  const spacingX = 130, spacingY = 100;
  const startX = cx - (cols - 1) * spacingX / 2;
  const startY = cy - spacingY;

  TOWNS.forEach((t, i) => {
    const row = Math.floor(i / cols);
    const col = i % cols;
    // Offset odd rows for visual interest
    const rowCount = row < 2 ? cols : TOWNS.length - cols * 2;
    const rowStartX = cx - (Math.min(cols, rowCount) - 1) * spacingX / 2;
    const tx = rowStartX + col * spacingX;
    const ty = startY + row * spacingY;
    const ball = makeBall(cx, cy, 32, t.name, TEAL);
    ball.targetX = tx;
    ball.targetY = ty;
    ball.colony = t.colony;
    townBalls.push(ball);
  });
}

// States: 2 rows of 7 and 6, centered, bigger radius
function placeStates() {
  stateBalls = [];
  const cx = W / 2, cy = H / 2;
  const row1 = 7, row2 = 6;
  const spacingX = 110, spacingY = 110;
  const startY = cy - spacingY / 2;

  COLONIES.forEach((name, i) => {
    let tx, ty;
    if (i < row1) {
      tx = cx - (row1 - 1) * spacingX / 2 + i * spacingX;
      ty = startY;
    } else {
      const j = i - row1;
      tx = cx - (row2 - 1) * spacingX / 2 + j * spacingX;
      ty = startY + spacingY;
    }
    const ball = makeBall(cx, cy, 45, name, BLUE);
    ball.targetX = tx;
    ball.targetY = ty;
    ball.alpha = 0;
    stateBalls.push(ball);
  });
}

function townToStateIndex(colony) {
  const map = { MA: 0, PA: 1, NY: 2, VA: 3, SC: 4, CT: 5, RI: 6, MD: 7, GA: 8, NC: 9, NH: 10, DE: 11, NJ: 12 };
  return map[colony] || 0;
}

// ========================================
// RENDER
// ========================================
function render(now) {
  const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.05) : 0;
  lastTime = now;

  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  updateParticles(dt);
  updateSeeds(dt);
  updateNebulae(dt);

  // Timeline (debug)
  updateTimeline(phase);

  // =====================================================================
  // ACT I: THE FOUNDING
  // Phase 1.0 — Opening / The People (currently 'start')
  //   Future sub-phases:
  //     1.0  Opening        — MBE quote: "the focus of ideas"
  //     1.1  Idea Swirl     — Enlightenment words float, positive win, negative drop seeds
  //     1.2  Condense       — Positive words cluster into nebula blobs
  //     1.3  Form People    — Nebula blobs condense into "The People" sphere
  // =====================================================================

  // --- ACT I / Phase 1.0: Opening — MBE Quote (dynamic grow) ---
  if (phase === 'opening') {
    phaseT += dt;
    const quote = 'The focus of ideas';
    const charsVisible = Math.min(quote.length, Math.floor(phaseT * 6)); // ~6 chars/sec
    const visibleText = quote.slice(0, charsVisible);

    // Scale grows from small to full
    const scaleT = Math.min(1, phaseT / 3.5);
    const scale = 0.5 + easeOutBack(scaleT) * 0.5;
    const fontSize = 20 + scale * 14; // 20 → 34px

    // Glow intensifies as text completes
    const glowIntensity = easeInOut(Math.min(1, charsVisible / quote.length));

    ctx.save();
    ctx.translate(W/2, H/2 - 15);
    ctx.scale(scale, scale);
    ctx.globalAlpha = Math.min(1, phaseT * 1.5) * 0.9;
    ctx.font = 'italic ' + fontSize + 'px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = GOLD; ctx.textAlign = 'center';
    ctx.shadowColor = GOLD; ctx.shadowBlur = glowIntensity * 20;
    ctx.fillText('"' + visibleText + (charsVisible < quote.length ? '' : '"'), 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Attribution fades in after quote completes
    if (charsVisible >= quote.length) {
      const attrAlpha = easeInOut(Math.min(1, (phaseT - quote.length / 6) * 1.5));
      ctx.save(); ctx.globalAlpha = attrAlpha * 0.5;
      ctx.font = '400 13px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
      ctx.fillText('— Mary Baker Eddy', W/2, H/2 + 25);
      ctx.restore();
    }

  // --- ACT I / Phase 1.1: Idea Swirl — The Enlightenment ---
  } else if (phase === 'swirl-founding') {
    drawTitle('The Enlightenment', 0.5);
    phaseT += dt;

    // Spawn words over first 6 seconds (slower, more readable)
    if (phaseT < 6) {
      const allWords = [...FOUNDING_POSITIVE.map(w=>({...w,positive:true})), ...FOUNDING_NEGATIVE.map(w=>({...w,positive:false}))];
      const spawnInterval = 6 / allWords.length;
      const shouldHave = Math.floor(phaseT / spawnInterval);
      while (floatingWords.length < shouldHave && floatingWords.length < allWords.length) {
        const def = allWords[floatingWords.length];
        floatingWords.push(makeWord(def.label, def.positive, def.color));
      }
    }

    // After 8 seconds, negative words start shrinking
    if (phaseT > 8) {
      floatingWords.filter(w => !w.positive && w.phase === 'drifting').forEach(w => {
        w.phase = 'shrinking';
      });
    }

    // After 9 seconds, positive words start winning
    if (phaseT > 9) {
      floatingWords.filter(w => w.positive && w.phase === 'drifting').forEach(w => {
        w.phase = 'winning';
      });
    }

    // Drop seeds when negative words fade out
    floatingWords.filter(w => !w.positive && w.phase === 'shrinking' && w.alpha < 0.05).forEach(w => {
      if (w.phase !== 'seeding') { w.phase = 'seeding'; dropSeed(w); }
    });

    updateWords(dt);
    drawWords();

    // Once swirl stabilizes (~12s), show click-to-continue
    if (phaseT > 12 && !waitingForClick) {
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
      narrate('Ideas take hold. Not all survive.');
    }

  // --- ACT I / Phase 1.2: Condense — Nebula Formation ---
  } else if (phase === 'condense-founding') {
    drawTitle('Principles Form', 0.5);
    phaseT += dt;

    // Fade out individual words
    floatingWords.forEach(w => {
      if (w.positive) w.alpha = Math.max(0, w.alpha - dt * 0.5);
    });
    drawWords();

    updateNebulae(dt);
    drawNebulae(now);

    if (phaseT > 4 && !waitingForClick) {
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
    }

  // --- ACT I / Phase 1.3: Form People — Blobs condense into sphere ---
  } else if (phase === 'form-people') {
    drawTitle('The People', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / 3);
    const ease = easeInOut(progress);

    // Condensing nebulae
    nebulae.forEach(n => {
      n.phase = 'condensing';
      n.targetX = W/2; n.targetY = H/2;
    });
    updateNebulae(dt);
    if (progress < 0.8) drawNebulae(now);

    // People sphere fading in
    if (progress > 0.3) {
      const sAlpha = easeInOut((progress - 0.3) * 2);
      const sR = 90 * easeOutBack(Math.min(1, (progress - 0.3) * 1.8));
      drawSphere(W/2, H/2, sR, GOLD, 'The People', sAlpha);
    }

    if (progress >= 1) {
      phase = 'people-ready'; phaseT = 0;
      peopleBall = makeBall(W/2, H/2, 90, 'The People', GOLD);
      nebulae = [];
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
      narrate('The People.');
    }

  // --- ACT I / Phase 1.3b: People Ready (click to continue) ---
  } else if (phase === 'people-ready') {
    drawTitle('The Origin of American Government', 0.5);
    const breathe = Math.sin(now / 600) * 4;
    drawSphere(peopleBall.x, peopleBall.y, peopleBall.r + breathe, peopleBall.color, peopleBall.label, 1);
    ctx.save(); ctx.globalAlpha = 0.4; ctx.font = '400 14px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
    ctx.fillText('circa 1750', W/2, H/2 + 120); ctx.restore();

  // --- ACT I / Phase 1.4a: Jitter People (auto-transition) ---
  } else if (phase === 'jitter-people') {
    drawTitle('The Origin of American Government', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / JITTER_DUR);
    const intensity = Math.sin(progress * Math.PI) * 14;
    const jx = (Math.random() - 0.5) * intensity * 2;
    const jy = (Math.random() - 0.5) * intensity * 2;
    drawSphere(peopleBall.x + jx, peopleBall.y + jy, peopleBall.r, peopleBall.color, peopleBall.label, 1);

    if (progress > 0.3) {
      ctx.save(); ctx.globalAlpha = (progress - 0.3) * 1.4;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      const ox = peopleBall.x + jx, oy = peopleBall.y + jy, pr = peopleBall.r;
      ctx.beginPath(); ctx.moveTo(ox - 5, oy - pr * 0.6); ctx.lineTo(ox + 3, oy); ctx.lineTo(ox - 8, oy + pr * 0.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox + 12, oy - pr * 0.4); ctx.lineTo(ox - 2, oy + pr * 0.2); ctx.stroke();
      ctx.restore();
    }

    if (progress >= 1) {
      phase = 'scatter';
      phaseT = 0;
      scatterTowns();
      spawnParticles(peopleBall.x, peopleBall.y, GOLD, 20);
      narrate('The people settled into towns and cities.');
    }

  // --- ACT I / Phase 1.4b: Scatter into Towns (auto-transition) ---
  } else if (phase === 'scatter') {
    drawTitle('The Origin of American Government', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / 1.5);
    const ease = easeOutBack(Math.min(1, progress));

    const pAlpha = 1 - easeInOut(Math.min(1, progress * 3));
    if (pAlpha > 0) drawSphere(peopleBall.x, peopleBall.y, peopleBall.r * (1 - progress * 0.5), peopleBall.color, peopleBall.label, pAlpha);

    // Ghost label
    if (progress > 0.3) {
      ctx.save(); ctx.globalAlpha = 0.2;
      ctx.font = '400 12px Segoe UI, system-ui, sans-serif'; ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
      ctx.fillText('The People', W / 2, H / 2 - 5); ctx.restore();
    }

    townBalls.forEach(b => {
      b.x = lerp(peopleBall.x, b.targetX, ease);
      b.y = lerp(peopleBall.y, b.targetY, ease);
      drawSphere(b.x, b.y, b.r * Math.min(1, ease), b.color, b.label, easeInOut(Math.min(1, progress * 2)));
    });

    drawParticles();

    if (progress >= 1) {
      phase = 'towns';
      phaseT = 0;
      townBalls.forEach(b => { b.x = b.targetX; b.y = b.targetY; });
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
    }

  // --- ACT I / Phase 1.4c: Towns — Colonial Capitals (click to continue) ---

    // Draw the 3 existing branches in an arc
    const orbitR = 120;
    branches.forEach(b => {
      const bx = W/2 + Math.cos(b.angle) * orbitR;
      const by = H/2 + Math.sin(b.angle) * orbitR * 0.8 + 20;
      drawSphere(bx, by, 35, b.color, b.label, Math.min(1, progress * 3));
    });

    // The 4th branch — The People — grows from below, encompassing all
    if (progress > 0.3) {
      const fourthT = Math.min(1, (progress - 0.3) / 0.5);
      const ease = easeInOut(fourthT);
      const ringR = 50 + ease * 130;
      const ringAlpha = ease * 0.35;

      // Glowing ring encompassing all branches
      ctx.save();
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = '#50c878';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#50c878';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.ellipse(W/2, H/2 + 10, ringR, ringR * 0.75, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Label
      if (fourthT > 0.5) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, (fourthT - 0.5) * 2);
        ctx.font = '700 18px Segoe UI, system-ui, sans-serif';
        ctx.fillStyle = '#50c878';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#50c878'; ctx.shadowBlur = 15;
        ctx.fillText("The People's Branch", W/2, H/2 + 120);
        ctx.restore();
      }
    }

    // Small people-spheres orbiting the ring
    if (progress > 0.5) {
      const nPeople = 8;
      const orbT = (progress - 0.5) * 2;
      for (let i = 0; i < nPeople; i++) {
        const a = (i / nPeople) * Math.PI * 2 + phaseT * 0.2;
        const oR = 155;
        const px = W/2 + Math.cos(a) * oR;
        const py = H/2 + 10 + Math.sin(a) * oR * 0.7;
        const pAlpha = Math.min(0.7, orbT);
        drawSphere(px, py, 8, '#50c878', '', pAlpha);
      }
    }

    if (progress >= 1 && !waitingForClick) {
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
      narrate('Three branches of government. And now — the fourth. The People.');
    }

  // --- ACT IV / Phase 4.4: Final — The Building Continues ---
  } else if (phase === 'final') {
    phaseT += dt;
    drawTitle('A More Perfect Union', 0.8);

    // Pulsing network of people-spheres
    const nodeCount = 12;
    const nodes = [];
    for (let i = 0; i < nodeCount; i++) {
      const angle = (i / nodeCount) * Math.PI * 2;
      const orbitR = 60 + (i % 3) * 40;
      const nx = W/2 + Math.cos(angle + phaseT * 0.15) * orbitR;
      const ny = H/2 + Math.sin(angle + phaseT * 0.15) * orbitR * 0.7;
      nodes.push({x: nx, y: ny});
      const pulse = 0.6 + Math.sin(now/1000 + i) * 0.2;
      drawSphere(nx, ny, (12 + (i%3)*4) * pulse, GOLD, '', 0.7);
    }
    ctx.save(); ctx.globalAlpha = 0.25; ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 1;
    nodes.forEach((a, i) => {
      nodes.forEach((b, j) => {
        if (j > i && dist(a.x, a.y, b.x, b.y) < 140) {
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      });
    });
    ctx.restore();

    const pulse = 0.85 + Math.sin(now / 1200) * 0.15;
    ctx.save(); ctx.globalAlpha = 0.9 * pulse;
    ctx.font = '700 28px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = GOLD; ctx.textAlign = 'center';
    ctx.fillText('A more perfect union.', W/2, H/2 - 15); ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.55;
    ctx.font = '400 16px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#b0b0b0'; ctx.textAlign = 'center';
    ctx.fillText('The building continues.', W/2, H/2 + 18); ctx.restore();

    hintEl.textContent = 'Click to begin again';
  }

  drawSeeds();
  drawNebulae(now);
  drawParticles();
  requestAnimationFrame(render);
}

// ========================================
// INTERACTIVE SPHERE SYSTEM
// ========================================
function makeInteractiveSphere(treeDef, x, y, r) {
  return {
    x, y, r, label: treeDef.label, color: treeDef.color,
    treeDef, state: 'idle', stateT: 0,
    children: [], parent: null, targetX: x, targetY: y,
    splitOriginX: x, splitOriginY: y,
  };
}

function updateInteractiveSphere(s, dt, now) {
  if (s.state === 'idle') {
    const breathe = Math.sin(now / 700 + s.x * 0.01) * 3;
    drawSphere(s.x, s.y, s.r + breathe, s.color, s.label, 1, s.treeDef.children.length > 0);

  } else if (s.state === 'jitter') {
    s.stateT += dt;
    const progress = Math.min(1, s.stateT / JITTER_DUR);
    const intensity = Math.sin(progress * Math.PI) * 12;
    const jx = (Math.random() - 0.5) * intensity * 2;
    const jy = (Math.random() - 0.5) * intensity * 2;
    drawSphere(s.x + jx, s.y + jy, s.r, s.color, s.label, 1);

    if (progress > 0.3) {
      ctx.save(); ctx.globalAlpha = (progress - 0.3) * 1.4;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(s.x - 5 + jx, s.y - s.r * 0.6 + jy); ctx.lineTo(s.x + 3 + jx, s.y + jy); ctx.lineTo(s.x - 8 + jx, s.y + s.r * 0.5 + jy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x + 10 + jx, s.y - s.r * 0.4 + jy); ctx.lineTo(s.x - 2 + jx, s.y + s.r * 0.2 + jy); ctx.stroke();
      ctx.restore();
    }

    if (progress >= 1) {
      s.state = 'splitting'; s.stateT = 0;
      const childDefs = s.treeDef.children;
      const childR = Math.max(28, s.r * 0.6);
      const targets = computeTargets(s, childDefs.length, childR);
      childDefs.forEach((def, i) => {
        const child = makeInteractiveSphere(def, s.x, s.y, childR);
        child.targetX = targets[i].x; child.targetY = targets[i].y;
        child.splitOriginX = s.x; child.splitOriginY = s.y;
        child.parent = s; child.state = 'appearing'; child.stateT = 0;
        s.children.push(child); spheres.push(child);
      });
      spawnParticles(s.x, s.y, s.color, 12);
    }

  } else if (s.state === 'splitting') {
    s.stateT += dt;
    const progress = Math.min(1, s.stateT / SPLIT_DUR);
    const parentAlpha = 1 - easeInOut(Math.min(1, progress * 3));
    if (parentAlpha > 0) drawSphere(s.x, s.y, s.r * (1 - progress * 0.5), s.color, s.label, parentAlpha);
    if (progress >= 1) { s.state = 'done'; updateHint(); }

  } else if (s.state === 'appearing') {
    const parent = s.parent;
    if (!parent) { s.state = 'idle'; return; }
    const progress = Math.min(1, parent.stateT / SPLIT_DUR);
    const ease = easeOutBack(Math.min(1, progress));
    s.x = lerp(s.splitOriginX, s.targetX, ease);
    s.y = lerp(s.splitOriginY, s.targetY, ease);
    drawSphere(s.x, s.y, s.r * Math.min(1, ease), s.color, s.label, easeInOut(Math.min(1, progress * 2)), s.treeDef.children.length > 0);
    if (progress >= 1) { s.state = 'idle'; s.x = s.targetX; s.y = s.targetY; updateHint(); }
  }
}

function computeTargets(parent, count, childR) {
  const targets = [];
  if (count === 2) {
    targets.push({ x: parent.x - childR * 2.3, y: parent.y });
    targets.push({ x: parent.x + childR * 2.3, y: parent.y });
  } else if (count === 3) {
    targets.push({ x: parent.x, y: parent.y - childR * 2.1 });
    targets.push({ x: parent.x - childR * 1.9, y: parent.y + childR * 1.4 });
    targets.push({ x: parent.x + childR * 1.9, y: parent.y + childR * 1.4 });
  } else {
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI / 2 + (i / count) * Math.PI * 2;
      targets.push({ x: parent.x + Math.cos(angle) * childR * 2.5, y: parent.y + Math.sin(angle) * childR * 2.5 });
    }
  }
  targets.forEach(t => {
    t.x = Math.max(childR + 10, Math.min(W - childR - 10, t.x));
    t.y = Math.max(childR + 40, Math.min(H - childR - 10, t.y));
  });
  return targets;
}

let closingQueued = false;
let leafSpheres = [];

function updateHint() {
  const clickable = spheres.filter(s => s.state === 'idle' && s.treeDef.children.length > 0);
  const pending = spheres.filter(s => s.state === 'appearing' || s.state === 'splitting');
  if (clickable.length > 0 || pending.length > 0) {
    if (clickable.length > 0) hintEl.textContent = 'Click a sphere to deconstruct. Drag to rearrange.';
  } else {
    hintEl.textContent = '';
    if (!closingQueued) {
      closingQueued = true;
      setTimeout(() => {
        if (phase === 'interactive') {
          phase = 'closing'; phaseT = 0;
          leafSpheres = spheres.filter(s => s.state === 'idle');
          leafSpheres.forEach(s => { s.originX = s.x; s.originY = s.y; });
          narrate('A more perfect union. The building continues.');
        }
      }, 1500);
    }
  }
}

// ========================================
// INPUT
// ========================================
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
}

// Click handler for all phases
canvas.addEventListener('click', function(e) {
  // Start / restart
  if (phase === 'opening' || phase === 'final') {
    logDwell(phase);
    dwellLog = []; phaseStartTime = Date.now();
    phase = 'swirl-founding'; phaseT = 0;
    floatingWords = []; seeds = []; nebulae = [];
    spheres = []; townBalls = []; stateBalls = []; leafSpheres = [];
    closingQueued = false; dragging = null; waitingForClick = false;
    peopleBall = makeBall(W / 2, H / 2, 90, 'The People', GOLD);
    hintEl.textContent = ''; narrationEl.textContent = '';
    return;
  }

  // Click-to-continue gates
  if (waitingForClick) {
    waitingForClick = false;
    logDwell(phase);
    hintEl.textContent = '';

    if (phase === 'swirl-founding') {
      phase = 'condense-founding'; phaseT = 0;
      // Create 3 nebulae from the winning words
      const nebulaConfigs = [
        { x: W/2 - 150, y: H/2 - 30, r: 80, color: '#f0d060', label: 'Rights of Man' },
        { x: W/2 + 120, y: H/2 - 50, r: 70, color: '#e8c840', label: 'Social Contract' },
        { x: W/2, y: H/2 + 60, r: 75, color: '#f0d060', label: 'Self-Governance' },
      ];
      nebulaConfigs.forEach(c => nebulae.push(makeNebula(c.x, c.y, c.r, c.color, c.label)));
      narrate('Principles form. Still rough. Still unfinished.');
    } else if (phase === 'condense-founding') {
      phase = 'form-people'; phaseT = 0;
      floatingWords = [];
      narrate('');
    } else if (phase === 'people-ready') {
      phase = 'jitter-people'; phaseT = 0;
    } else if (phase === 'towns') {
      phase = 'coalesce1'; phaseT = 0;
      placeStates();
      narrate('The towns coalesced into thirteen colonies.');
    } else if (phase === 'states') {
      phase = 'coalesce2'; phaseT = 0;
      narrate('And they forged a Constitution, creating a Constitutional Government of the people.');
    } else if (phase === 'gov-arrive') {
      phase = 'interactive'; phaseT = 0;
      const root = makeInteractiveSphere(DECONSTRUCT_TREE, W / 2, H / 2, 95);
      spheres.push(root);
      // Auto-start the first split — the click that got us here IS the deconstruct click
      root.state = 'jitter'; root.stateT = 0;
      narrate('Deconstructing.');
    } else if (phase === 'post-deconstruct') {
      phase = 'swirl-civil-war'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'swirl-civil-war') {
      phase = 'friction-civil-war'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'friction-civil-war') {
      phase = 'swirl-robber-barons'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'swirl-robber-barons') {
      phase = 'friction-robber-barons'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'friction-robber-barons') {
      phase = 'swirl-suffrage'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'swirl-suffrage') {
      phase = 'friction-suffrage'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'friction-suffrage') {
      phase = 'swirl-civil-rights'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'swirl-civil-rights') {
      phase = 'friction-civil-rights'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'friction-civil-rights') {
      phase = 'swirl-technology'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'swirl-technology') {
      phase = 'people-power'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'people-power') {
      phase = 'threats'; phaseT = 0;
      floatingWords = []; threatSpawnT = 0;
    } else if (phase === 'threats') {
      phase = 'the-fight'; phaseT = 0;
      floatingWords = []; fightSpawnT = 0;
    } else if (phase === 'the-fight') {
      phase = 'fourth-branch'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'fourth-branch') {
      phase = 'final'; phaseT = 0;
      reportDwell();
      narrate('The building continues.');
    }
    return;
  }
});

// Interactive: drag + click split
canvas.addEventListener('mousedown', function(e) {
  if (phase !== 'interactive') return;
  const pos = getMousePos(e);
  dragStartX = pos.x; dragStartY = pos.y; wasDrag = false;
  for (let i = spheres.length - 1; i >= 0; i--) {
    const s = spheres[i];
    if (s.state === 'idle' && dist(pos.x, pos.y, s.x, s.y) < s.r) {
      dragging = s;
      dragOffX = s.x - pos.x; dragOffY = s.y - pos.y;
      canvas.style.cursor = 'grabbing';
      return;
    }
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (phase !== 'interactive') return;
  const pos = getMousePos(e);
  if (dragging) {
    if (dist(pos.x, pos.y, dragStartX, dragStartY) > 5) wasDrag = true;
    dragging.x = pos.x + dragOffX; dragging.y = pos.y + dragOffY;
    return;
  }
  let found = false;
  for (let i = spheres.length - 1; i >= 0; i--) {
    if (spheres[i].state === 'idle' && dist(pos.x, pos.y, spheres[i].x, spheres[i].y) < spheres[i].r) {
      canvas.style.cursor = spheres[i].treeDef.children.length > 0 ? 'pointer' : 'grab';
      found = true; break;
    }
  }
  if (!found) canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseup', function() {
  if (dragging && !wasDrag && dragging.treeDef.children.length > 0 && dragging.state === 'idle') {
    dragging.state = 'jitter'; dragging.stateT = 0; hintEl.textContent = '';
  }
  dragging = null; canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseleave', function() { dragging = null; canvas.style.cursor = 'default'; });

// Touch
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const pos = getMousePos(e.touches[0]);

  if (phase === 'opening' || phase === 'final') {
    canvas.dispatchEvent(new MouseEvent('click', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
    return;
  }
  if (waitingForClick) {
    canvas.dispatchEvent(new MouseEvent('click', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
    return;
  }
  if (phase !== 'interactive') return;

  dragStartX = pos.x; dragStartY = pos.y; wasDrag = false;
  for (let i = spheres.length - 1; i >= 0; i--) {
    const s = spheres[i];
    if (s.state === 'idle' && dist(pos.x, pos.y, s.x, s.y) < s.r) {
      dragging = s;
      dragOffX = s.x - pos.x; dragOffY = s.y - pos.y;
      return;
    }
  }
});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (dragging) {
    const pos = getMousePos(e.touches[0]);
    if (dist(pos.x, pos.y, dragStartX, dragStartY) > 10) wasDrag = true;
    dragging.x = pos.x + dragOffX; dragging.y = pos.y + dragOffY;
  }
});
canvas.addEventListener('touchend', function() {
  if (dragging && !wasDrag && dragging.treeDef.children.length > 0 && dragging.state === 'idle') {
    dragging.state = 'jitter'; dragging.stateT = 0; hintEl.textContent = '';
  }
  dragging = null;
});

// Start
requestAnimationFrame(render);
</script>
