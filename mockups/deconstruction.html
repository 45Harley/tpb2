<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPB — Government Deconstruction</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas { cursor: pointer; border-radius: 8px; }
  .hint {
    margin-top: 12px;
    font-size: 0.8rem;
    color: #888;
    text-align: center;
    min-height: 20px;
  }
</style>
</head>
<body>

<canvas id="c" width="900" height="600"></canvas>
<div class="hint" id="hint">Click the sphere to deconstruct</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const W = 900, H = 600;

const GOLD = '#d4af37';
const BLUE = '#62a4d0';
const GREEN = '#5cb85c';
const PURPLE = '#9b59b6';
const CORAL = '#e07050';
const BG = '#0d0d1a';

// --- Tree definition ---
// Each node: { label, color, children: [...] }
const TREE = {
  label: 'Government', color: GOLD, children: [
    { label: 'Branches', color: GOLD, children: [
      { label: 'Congress', color: CORAL, children: [
        { label: 'Senate', color: CORAL, children: [] },
        { label: 'House', color: CORAL, children: [] },
      ]},
      { label: 'Executive', color: GREEN, children: [
        { label: 'President', color: GREEN, children: [] },
        { label: 'Cabinet', color: GREEN, children: [] },
        { label: 'Agencies', color: GREEN, children: [] },
      ]},
      { label: 'Judicial', color: PURPLE, children: [
        { label: 'Supreme Ct', color: PURPLE, children: [] },
        { label: 'Appeals', color: PURPLE, children: [] },
        { label: 'District', color: PURPLE, children: [] },
      ]},
    ]},
    { label: 'Jurisdictions', color: BLUE, children: [
      { label: 'Federal', color: BLUE, children: [] },
      { label: 'States', color: BLUE, children: [] },
      { label: 'Towns', color: BLUE, children: [] },
    ]},
  ]
};

// --- Live sphere objects ---
// Each: { x, y, r, label, color, treeDef, state, stateT, children[], parent }
let spheres = [];
let dragging = null;
let dragOffX = 0, dragOffY = 0;
let dragStartX = 0, dragStartY = 0;
let wasDrag = false;

const JITTER_DUR = 0.8;
const SPLIT_DUR = 0.7;

function makeSphere(treeDef, x, y, r) {
  return {
    x, y, r, label: treeDef.label, color: treeDef.color,
    treeDef, state: 'idle', stateT: 0,
    children: [], parent: null, targetX: x, targetY: y,
    splitOriginX: x, splitOriginY: y,
  };
}

// Initialize root
const root = makeSphere(TREE, W / 2, H / 2, 90);
spheres.push(root);

// --- Drawing ---
function drawSphere(s, now, alpha) {
  const { x, y, r, color, label } = s;
  if (alpha < 0.01 || r < 1) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Glow
  const glow = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.4);
  glow.addColorStop(0, color + '33');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  // Sphere gradient
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grad.addColorStop(0, lighten(color, 60));
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, darken(color, 40));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Rim
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Highlight
  ctx.beginPath();
  const hlGrad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.35, r * 0.05, x - r * 0.25, y - r * 0.35, r * 0.4);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.arc(x - r * 0.25, y - r * 0.35, r * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Label — dark text for readability
  const fontSize = Math.max(10, r * 0.26);
  ctx.font = '700 ' + fontSize + 'px Segoe UI, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#1a1030';
  ctx.shadowColor = 'rgba(255,255,255,0.3)';
  ctx.shadowBlur = 2;
  ctx.fillText(label, x, y);

  // Clickable indicator — small "+" if has children
  if (s.treeDef.children.length > 0 && s.state === 'idle') {
    ctx.font = '700 ' + (fontSize * 0.7) + 'px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#1a1030';
    ctx.shadowBlur = 0;
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillText('+', x, y + r * 0.45);
  }

  ctx.restore();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  return '#' + [Math.min(255, r + amt), Math.min(255, g + amt), Math.min(255, b + amt)]
    .map(c => c.toString(16).padStart(2, '0')).join('');
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  return '#' + [Math.max(0, r - amt), Math.max(0, g - amt), Math.max(0, b - amt)]
    .map(c => c.toString(16).padStart(2, '0')).join('');
}

function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}
function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}
function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

// --- Compute child target positions ---
function computeChildTargets(parent, childCount, childR) {
  const targets = [];
  if (childCount === 2) {
    targets.push({ x: parent.x - childR * 2.2, y: parent.y });
    targets.push({ x: parent.x + childR * 2.2, y: parent.y });
  } else if (childCount === 3) {
    // Triangle arrangement
    targets.push({ x: parent.x, y: parent.y - childR * 2 });
    targets.push({ x: parent.x - childR * 1.9, y: parent.y + childR * 1.3 });
    targets.push({ x: parent.x + childR * 1.9, y: parent.y + childR * 1.3 });
  } else {
    // Circle arrangement
    for (let i = 0; i < childCount; i++) {
      const angle = -Math.PI / 2 + (i / childCount) * Math.PI * 2;
      targets.push({
        x: parent.x + Math.cos(angle) * childR * 2.5,
        y: parent.y + Math.sin(angle) * childR * 2.5,
      });
    }
  }

  // Clamp to canvas bounds
  targets.forEach(t => {
    t.x = Math.max(childR + 10, Math.min(W - childR - 10, t.x));
    t.y = Math.max(childR + 10, Math.min(H - childR - 10, t.y));
  });

  return targets;
}

// --- Split a sphere into its children ---
function startSplit(sphere) {
  if (sphere.treeDef.children.length === 0) return;
  if (sphere.state !== 'idle') return;

  sphere.state = 'jitter';
  sphere.stateT = 0;
  hint.textContent = '';
}

// --- Render ---
let lastTime = 0;

function render(now) {
  const dt = lastTime ? (now - lastTime) / 1000 : 0;
  lastTime = now;

  // Background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.save();
  ctx.globalAlpha = 0.03;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = 0; gy < H; gy += 40) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }
  ctx.restore();

  // Title
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.font = '400 13px Segoe UI, system-ui, sans-serif';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  ctx.fillText('Visual Deconstruction', W / 2, 25);
  ctx.restore();

  // Draw connection lines between siblings
  spheres.forEach(s => {
    if (s.children.length > 0 && s.state === 'done') {
      // Lines from parent ghost to each child
      s.children.forEach(child => {
        if (child.state === 'done' || child.state === 'idle') {
          ctx.save();
          ctx.globalAlpha = 0.12;
          ctx.setLineDash([6, 6]);
          ctx.lineDashOffset = -now / 100;
          ctx.strokeStyle = '#666';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(child.x, child.y);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }
      });

      // Ghost label at parent position
      ctx.save();
      ctx.globalAlpha = 0.2;
      ctx.font = '400 11px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = '#888';
      ctx.textAlign = 'center';
      ctx.fillText(s.label, s.x, s.y - 8);
      ctx.restore();
    }
  });

  // Update and draw spheres
  spheres.forEach(s => {
    if (s.state === 'idle') {
      // Breathing
      const breathe = Math.sin(now / 700 + s.x * 0.01) * 3;
      const drawR = s.r + breathe;
      drawSphere({ ...s, r: drawR }, now, 1);

    } else if (s.state === 'jitter') {
      s.stateT += dt;
      const progress = Math.min(1, s.stateT / JITTER_DUR);

      const intensity = Math.sin(progress * Math.PI) * 12;
      const jx = (Math.random() - 0.5) * intensity * 2;
      const jy = (Math.random() - 0.5) * intensity * 2;
      const flicker = Math.random() > 0.5 ? s.color : lighten(s.color, 30);

      drawSphere({ ...s, x: s.x + jx, y: s.y + jy, color: flicker }, now, 1);

      // Crack lines
      if (progress > 0.3) {
        ctx.save();
        ctx.globalAlpha = (progress - 0.3) * 1.4;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(s.x - 5 + jx, s.y - s.r * 0.6 + jy);
        ctx.lineTo(s.x + 3 + jx, s.y + jy);
        ctx.lineTo(s.x - 8 + jx, s.y + s.r * 0.5 + jy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s.x + 10 + jx, s.y - s.r * 0.4 + jy);
        ctx.lineTo(s.x - 2 + jx, s.y + s.r * 0.2 + jy);
        ctx.stroke();
        ctx.restore();
      }

      if (progress >= 1) {
        s.state = 'splitting';
        s.stateT = 0;
        // Create children
        const childDefs = s.treeDef.children;
        const childR = Math.max(30, s.r * 0.65);
        const targets = computeChildTargets(s, childDefs.length, childR);

        childDefs.forEach((def, i) => {
          const child = makeSphere(def, s.x, s.y, childR);
          child.targetX = targets[i].x;
          child.targetY = targets[i].y;
          child.splitOriginX = s.x;
          child.splitOriginY = s.y;
          child.parent = s;
          child.state = 'appearing';
          child.stateT = 0;
          s.children.push(child);
          spheres.push(child);
        });
      }

    } else if (s.state === 'splitting') {
      s.stateT += dt;
      const progress = Math.min(1, s.stateT / SPLIT_DUR);

      // Fade out parent
      const parentAlpha = 1 - easeInOut(Math.min(1, progress * 3));
      if (parentAlpha > 0) {
        drawSphere({ ...s, r: s.r * (1 - progress * 0.5) }, now, parentAlpha);
      }

      // Burst particles
      if (progress < 0.4) {
        ctx.save();
        ctx.globalAlpha = (0.4 - progress) * 2;
        for (let i = 0; i < 10; i++) {
          const angle = (i / 10) * Math.PI * 2;
          const d = progress * 180;
          const px = s.x + Math.cos(angle) * d;
          const py = s.y + Math.sin(angle) * d;
          const pr = 3 - progress * 6;
          if (pr > 0.5) {
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI * 2);
            ctx.fillStyle = s.color;
            ctx.fill();
          }
        }
        ctx.restore();
      }

      if (progress >= 1) {
        s.state = 'done';
        updateHint();
      }

    } else if (s.state === 'appearing') {
      // Animated by parent's splitting state
      const parent = s.parent;
      if (!parent) { s.state = 'idle'; return; }
      const progress = Math.min(1, parent.stateT / SPLIT_DUR);
      const ease = easeOutBack(progress);

      s.x = s.splitOriginX + (s.targetX - s.splitOriginX) * ease;
      s.y = s.splitOriginY + (s.targetY - s.splitOriginY) * ease;

      const childAlpha = easeInOut(Math.min(1, progress * 2));
      const childR = s.r * Math.min(1, ease);
      drawSphere({ ...s, r: childR }, now, childAlpha);

      if (progress >= 1) {
        s.state = 'idle';
        s.x = s.targetX;
        s.y = s.targetY;
      }

    } else if (s.state === 'done') {
      // Parent that already split — don't draw sphere, just ghost label handled above
    }
  });

  requestAnimationFrame(render);
}

function updateHint() {
  const clickable = spheres.filter(s => s.state === 'idle' && s.treeDef.children.length > 0);
  if (clickable.length > 0) {
    hint.textContent = 'Click a sphere to deconstruct further. Drag to rearrange.';
  } else {
    const leaves = spheres.filter(s => s.state === 'idle');
    if (leaves.length > 0) {
      hint.textContent = 'Fully deconstructed. Drag spheres to rearrange.';
    }
  }
}

// --- Interaction ---
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height)
  };
}

function findSphereAt(pos) {
  // Search in reverse so top-drawn spheres are picked first
  for (let i = spheres.length - 1; i >= 0; i--) {
    const s = spheres[i];
    if ((s.state === 'idle' || s.state === 'done') && s.state !== 'done') {
      if (dist(pos.x, pos.y, s.x, s.y) < s.r) return s;
    }
  }
  return null;
}

canvas.addEventListener('mousedown', function(e) {
  const pos = getMousePos(e);
  dragStartX = pos.x;
  dragStartY = pos.y;
  wasDrag = false;

  for (let i = spheres.length - 1; i >= 0; i--) {
    const s = spheres[i];
    if (s.state === 'idle' && dist(pos.x, pos.y, s.x, s.y) < s.r) {
      dragging = s;
      dragOffX = s.x - pos.x;
      dragOffY = s.y - pos.y;
      canvas.style.cursor = 'grabbing';
      return;
    }
  }
});

canvas.addEventListener('mousemove', function(e) {
  const pos = getMousePos(e);

  if (dragging) {
    const moved = dist(pos.x, pos.y, dragStartX, dragStartY);
    if (moved > 5) wasDrag = true;
    dragging.x = pos.x + dragOffX;
    dragging.y = pos.y + dragOffY;
    return;
  }

  // Hover
  const s = findSphereAt(pos);
  if (s) {
    canvas.style.cursor = s.treeDef.children.length > 0 ? 'pointer' : 'grab';
  } else {
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mouseup', function(e) {
  if (dragging && !wasDrag) {
    // It was a click, not a drag
    if (dragging.treeDef.children.length > 0 && dragging.state === 'idle') {
      startSplit(dragging);
    }
  }
  dragging = null;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseleave', function() {
  dragging = null;
  canvas.style.cursor = 'default';
});

// Touch support
let touchStartX = 0, touchStartY = 0, touchWasDrag = false;

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const pos = getMousePos(e.touches[0]);
  touchStartX = pos.x;
  touchStartY = pos.y;
  touchWasDrag = false;

  for (let i = spheres.length - 1; i >= 0; i--) {
    const s = spheres[i];
    if (s.state === 'idle' && dist(pos.x, pos.y, s.x, s.y) < s.r) {
      dragging = s;
      dragOffX = s.x - pos.x;
      dragOffY = s.y - pos.y;
      return;
    }
  }
});

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (dragging) {
    const pos = getMousePos(e.touches[0]);
    const moved = dist(pos.x, pos.y, touchStartX, touchStartY);
    if (moved > 10) touchWasDrag = true;
    dragging.x = pos.x + dragOffX;
    dragging.y = pos.y + dragOffY;
  }
});

canvas.addEventListener('touchend', function(e) {
  if (dragging && !touchWasDrag) {
    if (dragging.treeDef.children.length > 0 && dragging.state === 'idle') {
      startSplit(dragging);
    }
  }
  dragging = null;
});

// Start
updateHint();
requestAnimationFrame(render);
</script>

</body>
</html>
