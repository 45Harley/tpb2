<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPB Globe — Skinned 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas { border-radius: 8px; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .narration {
    margin-top: 14px;
    text-align: center;
    font-size: 1.05rem;
    color: #b0b0b0;
    min-height: 36px;
  }
  .narration .speaker { color: #d4af37; font-weight: 600; }
  .hint { margin-top: 6px; font-size: 0.7rem; color: #444; }
</style>
</head>
<body>

<canvas id="c" width="900" height="620"></canvas>
<div class="narration">
  <span class="speaker">Claudia:</span> <span id="nText">Drag to explore. Click to begin.</span>
</div>
<div class="hint">Drag to rotate · Scroll to zoom · Skinned 3D globe with civic engine overlay</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 620;
const nText = document.getElementById('nText');

const GOLD = '#d4af37';
const BLUE = '#62a4d0';
const BG = '#0d0d1a';

// --- Voice ---
let claudiaVoice = null;
function pickVoice() {
  const v = speechSynthesis.getVoices();
  claudiaVoice = v.find(x => /female/i.test(x.name) && /en.US/i.test(x.lang))
    || v.find(x => /zira|eva|samantha|karen|susan/i.test(x.name))
    || v.find(x => x.lang && x.lang.startsWith('en'));
}
speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

let spoken = false;
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.92; u.pitch = 1.05;
  if (claudiaVoice) u.voice = claudiaVoice;
  speechSynthesis.speak(u);
}

// --- 3D ---
let rotX = -0.3;
let rotY = -0.5;
let zoom = 1;
let t = 0;
const R = 200; // globe radius

function rot3d(x, y, z) {
  let x1 = x * Math.cos(rotY) - z * Math.sin(rotY);
  let z1 = x * Math.sin(rotY) + z * Math.cos(rotY);
  let y1 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
  let z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
  return { x: x1, y: y1, z: z2 };
}

function project(x, y, z) {
  const p = rot3d(x, y, z);
  const persp = 800;
  const s = persp / (persp + p.z) * zoom;
  return { sx: W/2 + p.x * s, sy: H/2 + p.y * s, s, z: p.z };
}

// --- Build sphere mesh ---
const SLICES = 24;
const STACKS = 16;
const verts = [];
const faces = [];

// Generate vertices
for (let i = 0; i <= STACKS; i++) {
  const phi = (i / STACKS) * Math.PI;
  for (let j = 0; j <= SLICES; j++) {
    const theta = (j / SLICES) * Math.PI * 2;
    verts.push({
      x: R * Math.sin(phi) * Math.cos(theta),
      y: -R * Math.cos(phi),
      z: R * Math.sin(phi) * Math.sin(theta),
      lat: 90 - (i / STACKS) * 180,
      lon: (j / SLICES) * 360 - 180
    });
  }
}

// Generate quad faces (as two triangles)
for (let i = 0; i < STACKS; i++) {
  for (let j = 0; j < SLICES; j++) {
    const a = i * (SLICES + 1) + j;
    const b = a + 1;
    const c = a + SLICES + 1;
    const d = c + 1;
    faces.push([a, b, d, c]);
  }
}

// --- Approximate land masses (lat/lon bounding boxes) ---
const landMasses = [
  // North America
  { latMin: 25, latMax: 50, lonMin: -130, lonMax: -65, color: '#1a3a1a' },
  // South America
  { latMin: -55, latMax: 12, lonMin: -80, lonMax: -35, color: '#1a3a1a' },
  // Europe
  { latMin: 36, latMax: 60, lonMin: -10, lonMax: 40, color: '#1a3a1a' },
  // Africa
  { latMin: -35, latMax: 37, lonMin: -18, lonMax: 52, color: '#1a3a1a' },
  // Asia
  { latMin: 10, latMax: 60, lonMin: 40, lonMax: 145, color: '#1a3a1a' },
  // Australia
  { latMin: -40, latMax: -12, lonMin: 112, lonMax: 155, color: '#1a3a1a' },
];

// USA specifically
const usaBox = { latMin: 25, latMax: 50, lonMin: -125, lonMax: -67 };

function isLand(lat, lon) {
  return landMasses.some(lm =>
    lat >= lm.latMin && lat <= lm.latMax &&
    lon >= lm.lonMin && lon <= lm.lonMax
  );
}

function isUSA(lat, lon) {
  return lat >= usaBox.latMin && lat <= usaBox.latMax &&
         lon >= usaBox.lonMin && lon <= usaBox.lonMax;
}

// --- Key locations on globe ---
const locations = [
  { lat: 41.91, lon: -71.90, label: 'Putnam', color: GOLD, size: 6, pulse: true },
  { lat: 41.76, lon: -72.68, label: 'Hartford', color: BLUE, size: 3 },
  { lat: 40.71, lon: -74.01, label: 'New York', color: BLUE, size: 3 },
  { lat: 38.90, lon: -77.04, label: 'D.C.', color: '#e05555', size: 4 },
  { lat: 34.05, lon: -118.24, label: 'Los Angeles', color: BLUE, size: 3 },
  { lat: 41.88, lon: -87.63, label: 'Chicago', color: BLUE, size: 3 },
  { lat: 29.76, lon: -95.37, label: 'Houston', color: BLUE, size: 3 },
  { lat: 33.75, lon: -84.39, label: 'Atlanta', color: BLUE, size: 3 },
  { lat: 47.61, lon: -122.33, label: 'Seattle', color: BLUE, size: 3 },
  { lat: 25.76, lon: -80.19, label: 'Miami', color: BLUE, size: 3 },
];

function latLonTo3D(lat, lon, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return {
    x: -radius * Math.sin(phi) * Math.cos(theta),
    y: -radius * Math.cos(phi),
    z: radius * Math.sin(phi) * Math.sin(theta)
  };
}

// --- Civic engine ring orbiting the globe ---
const engineNodes = ['Polls', 'Ballots', 'Groups', 'Mandates', 'Beam'];
const engineR = R + 60;

// --- Render ---
function render() {
  t += 1 / 30;
  if (!dragging) rotY += 0.004;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Starfield BG
  ctx.save();
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 137.5 + t * 2) % W);
    const sy = ((i * 97.3) % H);
    const brightness = 0.1 + (Math.sin(t * 2 + i) * 0.5 + 0.5) * 0.3;
    ctx.globalAlpha = brightness;
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.restore();

  // --- Draw globe faces (painter's algorithm) ---
  const projFaces = [];
  for (const f of faces) {
    const pts = f.map(i => {
      const v = verts[i];
      return { ...project(v.x, v.y, v.z), lat: v.lat, lon: v.lon };
    });

    // Average z for sorting
    const avgZ = pts.reduce((s, p) => s + p.z, 0) / pts.length;

    // Face normal (backface cull)
    const v1x = pts[1].sx - pts[0].sx, v1y = pts[1].sy - pts[0].sy;
    const v2x = pts[2].sx - pts[0].sx, v2y = pts[2].sy - pts[0].sy;
    const cross = v1x * v2y - v1y * v2x;

    // Average lat/lon for coloring
    const avgLat = pts.reduce((s, p) => s + p.lat, 0) / pts.length;
    const avgLon = pts.reduce((s, p) => s + p.lon, 0) / pts.length;

    projFaces.push({ pts, avgZ, cross, avgLat, avgLon });
  }

  // Sort far to near
  projFaces.sort((a, b) => b.avgZ - a.avgZ);

  for (const f of projFaces) {
    if (f.cross > 0) continue; // backface

    // Color based on land/ocean/usa
    let fillColor;
    const usa = isUSA(f.avgLat, f.avgLon);
    const land = isLand(f.avgLat, f.avgLon);

    if (usa) {
      // USA gets a warm highlight
      const depth = 0.4 + Math.max(0, -f.avgZ / R) * 0.3;
      fillColor = `rgba(90, 70, 30, ${depth})`;
    } else if (land) {
      const depth = 0.3 + Math.max(0, -f.avgZ / R) * 0.25;
      fillColor = `rgba(25, 55, 25, ${depth})`;
    } else {
      const depth = 0.25 + Math.max(0, -f.avgZ / R) * 0.2;
      fillColor = `rgba(10, 20, 50, ${depth})`;
    }

    // Lighting: simple directional
    const lightZ = -f.avgZ / R;
    const light = Math.max(0.15, 0.5 + lightZ * 0.5);

    ctx.save();
    ctx.globalAlpha = light;
    ctx.beginPath();
    ctx.moveTo(f.pts[0].sx, f.pts[0].sy);
    for (let i = 1; i < f.pts.length; i++) {
      ctx.lineTo(f.pts[i].sx, f.pts[i].sy);
    }
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();

    // Grid lines
    ctx.strokeStyle = usa ? 'rgba(212,175,55,0.12)' : 'rgba(100,100,150,0.06)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }

  // --- Atmosphere glow ---
  ctx.save();
  const atmGrd = ctx.createRadialGradient(W/2, H/2, R * zoom * 0.85, W/2, H/2, R * zoom * 1.3);
  atmGrd.addColorStop(0, 'transparent');
  atmGrd.addColorStop(0.5, 'rgba(60, 120, 200, 0.06)');
  atmGrd.addColorStop(1, 'transparent');
  ctx.fillStyle = atmGrd;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // --- City/location pins ---
  for (const loc of locations) {
    const pos3 = latLonTo3D(loc.lat, loc.lon, R + 2);
    const p = project(pos3.x, pos3.y, pos3.z);

    // Only draw if on front side
    const rotPoint = rot3d(pos3.x, pos3.y, pos3.z);
    if (rotPoint.z > 30) continue;

    const r = loc.pulse ? loc.size + Math.sin(t * 3) * 3 : loc.size;

    // Glow
    ctx.save();
    ctx.globalAlpha = 0.4;
    const gGrd = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r * 3 * p.s);
    gGrd.addColorStop(0, loc.color);
    gGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = gGrd;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, r * 3 * p.s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Pin
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, r * p.s, 0, Math.PI * 2);
    ctx.fillStyle = loc.color;
    ctx.fill();
    ctx.restore();

    // Label
    if (r * p.s > 2) {
      ctx.save();
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = loc.color;
      ctx.font = (loc.pulse ? '700 ' : '400 ') + Math.max(8, 11 * p.s) + 'px Segoe UI, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(loc.label, p.sx, p.sy - r * p.s - 6);
      ctx.restore();
    }
  }

  // --- Civic engine ring orbiting above globe ---
  ctx.save();
  for (let i = 0; i < engineNodes.length; i++) {
    const angle = (i / engineNodes.length) * Math.PI * 2 + t * 0.3;
    const ex = Math.cos(angle) * engineR;
    const ey = -R - 40;
    const ez = Math.sin(angle) * engineR;
    const p = project(ex, ey, ez);

    const rp = rot3d(ex, ey, ez);
    const depthAlpha = rp.z < 100 ? 0.9 : 0.3;

    // Node
    ctx.globalAlpha = depthAlpha;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, 16 * p.s, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.fillStyle = GOLD;
    ctx.font = '600 ' + Math.max(7, 10 * p.s) + 'px Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(engineNodes[i], p.sx, p.sy);

    // Connection to next
    const j = (i + 1) % engineNodes.length;
    const angle2 = (j / engineNodes.length) * Math.PI * 2 + t * 0.3;
    const p2 = project(Math.cos(angle2) * engineR, ey, Math.sin(angle2) * engineR);
    ctx.globalAlpha = depthAlpha * 0.3;
    ctx.beginPath();
    ctx.setLineDash([4, 4]);
    ctx.lineDashOffset = -t * 30;
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1;
    ctx.moveTo(p.sx, p.sy);
    ctx.lineTo(p2.sx, p2.sy);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();

  // Title
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = GOLD;
  ctx.font = '600 16px Segoe UI, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText("The People's Branch", W/2, 28);
  ctx.font = '400 11px Segoe UI, system-ui, sans-serif';
  ctx.fillStyle = '#666';
  ctx.fillText("A more perfect union — town by town, state by state", W/2, 46);
  ctx.restore();
}

// --- Interaction ---
let dragging = false;
let lastMX = 0, lastMY = 0;

canvas.addEventListener('mousedown', e => {
  dragging = true;
  lastMX = e.clientX;
  lastMY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  rotY += (e.clientX - lastMX) * 0.006;
  rotX += (e.clientY - lastMY) * 0.006;
  rotX = Math.max(-1.2, Math.min(1.2, rotX));
  lastMX = e.clientX;
  lastMY = e.clientY;
});
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.95 : 1.05;
  zoom = Math.max(0.4, Math.min(2.5, zoom));
});

// Start
document.addEventListener('click', function() {
  if (!spoken) {
    spoken = true;
    speak("The People's Branch. A more perfect union, town by town, state by state. Putnam, Connecticut — your home on the globe.");
    nText.textContent = "A more perfect union, town by town, state by state.";
  }
}, { once: true });

setInterval(render, 1000 / 30);
</script>

</body>
</html>
