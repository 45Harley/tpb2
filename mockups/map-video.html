<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPB Video Skin — 3D Canvas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: auto;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas { border-radius: 8px; cursor: grab; border: 1px solid #d4af37; }
  canvas:active { cursor: grabbing; }
  .controls {
    margin-top: 14px;
    display: flex;
    gap: 10px;
  }
  .controls button {
    padding: 6px 16px;
    border-radius: 16px;
    border: 1px solid #d4af37;
    background: transparent;
    color: #d4af37;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .controls button:hover, .controls button.active {
    background: #d4af37;
    color: #000;
  }
  .hint { margin-top: 8px; font-size: 0.7rem; color: #b0b0b0; }
</style>
</head>
<body>

<canvas id="c" width="900" height="380"></canvas>
<div class="controls">
  <button onclick="setMode('flat')" id="mFlat" class="active">Flat Screen</button>
  <button onclick="setMode('cube')" id="mCube">Rotating Cube</button>
  <button onclick="setMode('cylinder')" id="mCyl">Cylinder</button>
  <button onclick="setMode('sphere')" id="mSphere">Globe</button>
  <button onclick="setMode('flag')" id="mFlag">Waving Flag</button>
  <button onclick="setMode('imgcube')" id="mImgcube">Photo Cube</button>
</div>
<div class="hint">Drag to rotate · Scroll to zoom · Video mapped onto 3D surfaces</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 380;
const GOLD = '#d4af37';

// --- Video ---
const video = document.createElement('video');
video.src = 'testhg.mp4';
video.loop = true;
video.muted = true;
video.playsInline = true;

// Offscreen canvas to grab video frames
const vCanvas = document.createElement('canvas');
const vCtx = vCanvas.getContext('2d', { willReadFrequently: true });

let videoReady = false;
video.addEventListener('loadeddata', () => {
  vCanvas.width = video.videoWidth;
  vCanvas.height = video.videoHeight;
  videoReady = true;
});

// --- Load 6 images for photo cube ---
const imgSrcs = [
  '/0media/PeoplesBranch.png',
  '/help/screenshots/elections-01-landing.png',
  '/help/screenshots/onboarding-01-home.png',
  '/help/screenshots/elections-05-threats.png',
  '/help/screenshots/polls-02-threat-stream.png',
  '/help/screenshots/elections-06-stream.png',
];
const cubeImgs = [];
let imgsLoaded = 0;
imgSrcs.forEach((src, i) => {
  const img = new Image();
  img.onload = () => { imgsLoaded++; };
  img.src = src;
  cubeImgs.push(img);
});

// --- 3D state ---
let rotX = -0.2;
let rotY = 0;
let zoom = 1;
let t = 0;
let mode = 'flat';
let autoRot = true;

function rot3d(x, y, z) {
  let x1 = x * Math.cos(rotY) - z * Math.sin(rotY);
  let z1 = x * Math.sin(rotY) + z * Math.cos(rotY);
  let y1 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
  let z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
  return { x: x1, y: y1, z: z2 };
}

function project(x, y, z) {
  const p = rot3d(x, y, z);
  const persp = 800;
  const s = persp / (persp + p.z) * zoom;
  return { sx: W/2 + p.x * s, sy: H/2 + p.y * s, s, z: p.z };
}

// --- Get video frame as ImageData ---
function getVideoFrame() {
  if (!videoReady) return null;
  vCtx.drawImage(video, 0, 0);
  return vCtx.getImageData(0, 0, vCanvas.width, vCanvas.height);
}

// --- Sample video pixel at UV coords ---
function sampleVideo(u, v) {
  if (!videoReady) return [20, 20, 40, 255];
  // Clamp
  u = Math.max(0, Math.min(1, u));
  v = Math.max(0, Math.min(1, v));
  const px = Math.floor(u * (vCanvas.width - 1));
  const py = Math.floor(v * (vCanvas.height - 1));
  const idx = (py * vCanvas.width + px) * 4;
  const d = frameData;
  if (!d) return [20, 20, 40, 255];
  return [d.data[idx], d.data[idx+1], d.data[idx+2], d.data[idx+3]];
}

let frameData = null;

// ========================
// MODE: Flat floating screen
// ========================
function drawFlat() {
  if (!videoReady) return;
  const hw = 250, hh = 160;
  const corners3d = [
    [-hw, -hh, 0], [hw, -hh, 0], [hw, hh, 0], [-hw, hh, 0]
  ];
  const proj = corners3d.map(c => project(c[0], c[1], c[2]));

  // Draw video mapped to quad using drawImage with transform
  ctx.save();

  // Simple perspective: draw video stretched to projected quad
  // Use the top-left and dimensions approach
  const minX = Math.min(...proj.map(p => p.sx));
  const maxX = Math.max(...proj.map(p => p.sx));
  const minY = Math.min(...proj.map(p => p.sy));
  const maxY = Math.max(...proj.map(p => p.sy));

  // Clip to quad shape
  ctx.beginPath();
  ctx.moveTo(proj[0].sx, proj[0].sy);
  for (let i = 1; i < 4; i++) ctx.lineTo(proj[i].sx, proj[i].sy);
  ctx.closePath();
  ctx.clip();

  ctx.drawImage(video, minX, minY, maxX - minX, maxY - minY);
  ctx.restore();

  // Border
  ctx.beginPath();
  ctx.moveTo(proj[0].sx, proj[0].sy);
  for (let i = 1; i < 4; i++) ctx.lineTo(proj[i].sx, proj[i].sy);
  ctx.closePath();
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Reflection
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.translate(0, maxY - minY + maxY);
  ctx.scale(1, -0.3);
  ctx.drawImage(video, minX, minY, maxX - minX, maxY - minY);
  ctx.restore();
}

// ========================
// MODE: Rotating Cube
// ========================
function drawCube() {
  if (!videoReady) return;
  const s = 140;
  const cubeVerts = [
    [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
    [-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]
  ];
  const cubeFaces = [
    [0,1,2,3], // front
    [5,4,7,6], // back
    [4,0,3,7], // left
    [1,5,6,2], // right
    [4,5,1,0], // top
    [3,2,6,7], // bottom
  ];

  const projected = cubeVerts.map(v => project(v[0], v[1], v[2]));

  // Sort faces by average z
  const sortedFaces = cubeFaces.map((f, fi) => {
    const avgZ = f.reduce((sum, vi) => sum + projected[vi].z, 0) / 4;
    return { f, fi, avgZ };
  }).sort((a, b) => b.avgZ - a.avgZ);

  for (const { f, fi } of sortedFaces) {
    const pts = f.map(vi => projected[vi]);

    // Backface check
    const v1x = pts[1].sx - pts[0].sx, v1y = pts[1].sy - pts[0].sy;
    const v2x = pts[2].sx - pts[0].sx, v2y = pts[2].sy - pts[0].sy;
    if (v1x * v2y - v1y * v2x > 0) continue;

    // Clip and draw video on face
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0].sx, pts[0].sy);
    for (let i = 1; i < 4; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
    ctx.closePath();
    ctx.clip();

    const minX = Math.min(...pts.map(p => p.sx));
    const maxX = Math.max(...pts.map(p => p.sx));
    const minY = Math.min(...pts.map(p => p.sy));
    const maxY = Math.max(...pts.map(p => p.sy));

    // Slight color tint per face
    ctx.drawImage(video, minX, minY, maxX - minX, maxY - minY);

    // Lighting overlay
    const light = 0.6 + (1 - (pts[0].z + s) / (2 * s)) * 0.4;
    ctx.fillStyle = `rgba(0,0,0,${1 - light})`;
    ctx.fillRect(minX, minY, maxX - minX, maxY - minY);

    ctx.restore();

    // Edge
    ctx.beginPath();
    ctx.moveTo(pts[0].sx, pts[0].sy);
    for (let i = 1; i < 4; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
    ctx.closePath();
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ========================
// MODE: Cylinder
// ========================
function drawCylinder() {
  if (!videoReady) return;
  const R = 180, halfH = 150;
  const segments = 32;

  const strips = [];
  for (let i = 0; i < segments; i++) {
    const a1 = (i / segments) * Math.PI * 2;
    const a2 = ((i + 1) / segments) * Math.PI * 2;
    const pts = [
      project(Math.cos(a1)*R, -halfH, Math.sin(a1)*R),
      project(Math.cos(a2)*R, -halfH, Math.sin(a2)*R),
      project(Math.cos(a2)*R, halfH, Math.sin(a2)*R),
      project(Math.cos(a1)*R, halfH, Math.sin(a1)*R),
    ];
    const avgZ = pts.reduce((s,p) => s+p.z, 0) / 4;
    strips.push({ pts, avgZ, u1: i/segments, u2: (i+1)/segments });
  }

  strips.sort((a,b) => b.avgZ - a.avgZ);

  for (const strip of strips) {
    const pts = strip.pts;

    // Backface
    const v1x = pts[1].sx-pts[0].sx, v1y = pts[1].sy-pts[0].sy;
    const v2x = pts[2].sx-pts[0].sx, v2y = pts[2].sy-pts[0].sy;
    if (v1x*v2y - v1y*v2x > 0) continue;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0].sx, pts[0].sy);
    for (let i=1;i<4;i++) ctx.lineTo(pts[i].sx, pts[i].sy);
    ctx.closePath();
    ctx.clip();

    // Map video strip
    const srcX = strip.u1 * vCanvas.width;
    const srcW = (strip.u2 - strip.u1) * vCanvas.width;
    const minX = Math.min(...pts.map(p=>p.sx));
    const maxX = Math.max(...pts.map(p=>p.sx));
    const minY = Math.min(...pts.map(p=>p.sy));
    const maxY = Math.max(...pts.map(p=>p.sy));

    ctx.drawImage(video, srcX, 0, srcW, vCanvas.height, minX, minY, maxX-minX, maxY-minY);

    // Lighting
    const light = 0.4 + (1 - (strip.avgZ + R)/(2*R)) * 0.6;
    ctx.fillStyle = `rgba(0,0,0,${1-light})`;
    ctx.fillRect(minX, minY, maxX-minX, maxY-minY);
    ctx.restore();
  }
}

// ========================
// MODE: Sphere (globe with video skin)
// ========================
function drawSphere() {
  if (!videoReady) return;
  const R = 200;
  const slices = 24, stacks = 16;
  const quads = [];

  for (let i = 0; i < stacks; i++) {
    for (let j = 0; j < slices; j++) {
      const phi1 = (i/stacks)*Math.PI, phi2 = ((i+1)/stacks)*Math.PI;
      const th1 = (j/slices)*Math.PI*2, th2 = ((j+1)/slices)*Math.PI*2;

      const pts = [
        project(R*Math.sin(phi1)*Math.cos(th1), -R*Math.cos(phi1), R*Math.sin(phi1)*Math.sin(th1)),
        project(R*Math.sin(phi1)*Math.cos(th2), -R*Math.cos(phi1), R*Math.sin(phi1)*Math.sin(th2)),
        project(R*Math.sin(phi2)*Math.cos(th2), -R*Math.cos(phi2), R*Math.sin(phi2)*Math.sin(th2)),
        project(R*Math.sin(phi2)*Math.cos(th1), -R*Math.cos(phi2), R*Math.sin(phi2)*Math.sin(th1)),
      ];
      const avgZ = pts.reduce((s,p)=>s+p.z,0)/4;
      quads.push({ pts, avgZ, u1:j/slices, u2:(j+1)/slices, v1:i/stacks, v2:(i+1)/stacks });
    }
  }

  quads.sort((a,b) => b.avgZ - a.avgZ);

  for (const q of quads) {
    const pts = q.pts;
    const v1x=pts[1].sx-pts[0].sx, v1y=pts[1].sy-pts[0].sy;
    const v2x=pts[2].sx-pts[0].sx, v2y=pts[2].sy-pts[0].sy;
    if (v1x*v2y-v1y*v2x > 0) continue;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0].sx, pts[0].sy);
    for(let i=1;i<4;i++) ctx.lineTo(pts[i].sx, pts[i].sy);
    ctx.closePath();
    ctx.clip();

    const srcX = q.u1*vCanvas.width, srcW = (q.u2-q.u1)*vCanvas.width;
    const srcY = q.v1*vCanvas.height, srcH = (q.v2-q.v1)*vCanvas.height;
    const minX=Math.min(...pts.map(p=>p.sx)), maxX=Math.max(...pts.map(p=>p.sx));
    const minY=Math.min(...pts.map(p=>p.sy)), maxY=Math.max(...pts.map(p=>p.sy));

    ctx.drawImage(video, srcX, srcY, Math.max(1,srcW), Math.max(1,srcH), minX, minY, maxX-minX||1, maxY-minY||1);

    const light = 0.3 + (1-(q.avgZ+R)/(2*R))*0.7;
    ctx.fillStyle = `rgba(0,0,0,${1-light})`;
    ctx.fillRect(minX,minY,maxX-minX,maxY-minY);
    ctx.restore();
  }

  // Atmosphere
  ctx.save();
  const grd = ctx.createRadialGradient(W/2,H/2,R*zoom*0.9,W/2,H/2,R*zoom*1.2);
  grd.addColorStop(0,'transparent');
  grd.addColorStop(0.6,'rgba(60,120,200,0.05)');
  grd.addColorStop(1,'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ========================
// MODE: Waving Flag
// ========================
function drawFlag() {
  if (!videoReady) return;
  const cols = 30, rows = 20;
  const fw = 350, fh = 220;
  const quads = [];

  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const pts = [];
      for (const [di,dj] of [[0,0],[0,1],[1,1],[1,0]]) {
        const u = (j+dj)/cols, v = (i+di)/rows;
        const x = (u - 0.5) * fw;
        const y = (v - 0.5) * fh;
        const wave = Math.sin(u * 4 + t * 3) * 20 + Math.sin(v * 3 + t * 2) * 10;
        const z = wave;
        pts.push(project(x, y, z));
      }
      const avgZ = pts.reduce((s,p)=>s+p.z,0)/4;
      quads.push({ pts, avgZ, u1:j/cols, u2:(j+1)/cols, v1:i/rows, v2:(i+1)/rows });
    }
  }

  quads.sort((a,b) => b.avgZ - a.avgZ);

  for (const q of quads) {
    const pts = q.pts;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0].sx, pts[0].sy);
    for(let i=1;i<4;i++) ctx.lineTo(pts[i].sx, pts[i].sy);
    ctx.closePath();
    ctx.clip();

    const srcX=q.u1*vCanvas.width, srcW=(q.u2-q.u1)*vCanvas.width;
    const srcY=q.v1*vCanvas.height, srcH=(q.v2-q.v1)*vCanvas.height;
    const minX=Math.min(...pts.map(p=>p.sx)), maxX=Math.max(...pts.map(p=>p.sx));
    const minY=Math.min(...pts.map(p=>p.sy)), maxY=Math.max(...pts.map(p=>p.sy));

    ctx.drawImage(video, srcX, srcY, Math.max(1,srcW), Math.max(1,srcH), minX, minY, maxX-minX||1, maxY-minY||1);

    const light = 0.5 + (1-(q.avgZ+30)/60)*0.5;
    ctx.fillStyle = `rgba(0,0,0,${Math.max(0,1-light)})`;
    ctx.fillRect(minX,minY,maxX-minX,maxY-minY);
    ctx.restore();
  }
}

// ========================
// MODE: Image Cube
// ========================
function drawImgCube() {
  if (imgsLoaded < 6) {
    ctx.fillStyle = GOLD;
    ctx.font = '16px Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Loading images... (' + imgsLoaded + '/6)', W/2, H/2);
    return;
  }
  const s = 130;
  const cubeVerts = [
    [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
    [-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]
  ];
  // Winding order reversed so images face OUTWARD
  const cubeFaces = [
    { v:[3,2,1,0], img:0 }, // front
    { v:[6,7,4,5], img:1 }, // back
    { v:[7,3,0,4], img:2 }, // left
    { v:[2,6,5,1], img:3 }, // right
    { v:[0,1,5,4], img:4 }, // top
    { v:[7,6,2,3], img:5 }, // bottom
  ];

  const projected = cubeVerts.map(v => project(v[0], v[1], v[2]));

  const sortedFaces = cubeFaces.map((f, fi) => {
    const avgZ = f.v.reduce((sum, vi) => sum + projected[vi].z, 0) / 4;
    return { ...f, fi, avgZ };
  }).sort((a, b) => b.avgZ - a.avgZ);

  for (const face of sortedFaces) {
    const pts = face.v.map(vi => projected[vi]);

    // Backface check — skip faces pointing away
    const v1x = pts[1].sx - pts[0].sx, v1y = pts[1].sy - pts[0].sy;
    const v2x = pts[2].sx - pts[0].sx, v2y = pts[2].sy - pts[0].sy;
    if (v1x * v2y - v1y * v2x > 0) continue;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0].sx, pts[0].sy);
    for (let i = 1; i < 4; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
    ctx.closePath();
    ctx.clip();

    const minX = Math.min(...pts.map(p => p.sx));
    const maxX = Math.max(...pts.map(p => p.sx));
    const minY = Math.min(...pts.map(p => p.sy));
    const maxY = Math.max(...pts.map(p => p.sy));

    ctx.drawImage(cubeImgs[face.img], minX, minY, maxX - minX, maxY - minY);

    // Lighting
    const light = 0.6 + (1 - (pts[0].z + s) / (2 * s)) * 0.4;
    ctx.fillStyle = `rgba(0,0,0,${1 - light})`;
    ctx.fillRect(minX, minY, maxX - minX, maxY - minY);

    ctx.restore();

    // Gold edge
    ctx.beginPath();
    ctx.moveTo(pts[0].sx, pts[0].sy);
    for (let i = 1; i < 4; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
    ctx.closePath();
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// --- Mode switching ---
function setMode(m) {
  mode = m;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('m' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
  if (m === 'flat') { rotX = -0.1; rotY = 0.3; }
  if (m === 'cube') { rotX = -0.3; rotY = 0.5; }
  if (m === 'cylinder') { rotX = -0.1; rotY = 0; }
  if (m === 'sphere') { rotX = -0.3; rotY = 0; }
  if (m === 'flag') { rotX = -0.1; rotY = 0; }
  if (m === 'imgcube') { rotX = -0.3; rotY = 0.5; }
}

// --- Render loop ---
function render() {
  t += 1/30;
  if (autoRot && !dragging) rotY += 0.008;

  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  // Starfield
  ctx.save();
  for (let i=0;i<60;i++) {
    const sx=((i*137.5+t)%W), sy=((i*97.3)%H);
    ctx.globalAlpha = 0.1+Math.sin(t+i)*0.15;
    ctx.fillStyle='#fff';
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.restore();

  if (videoReady) {
    vCtx.drawImage(video, 0, 0);
    frameData = vCtx.getImageData(0, 0, vCanvas.width, vCanvas.height);
  }

  if (mode==='flat') drawFlat();
  else if (mode==='cube') drawCube();
  else if (mode==='cylinder') drawCylinder();
  else if (mode==='sphere') drawSphere();
  else if (mode==='flag') drawFlag();
  else if (mode==='imgcube') drawImgCube();

  // Title
  ctx.save();
  ctx.globalAlpha=0.5;
  ctx.fillStyle=GOLD;
  ctx.font='600 14px Segoe UI, system-ui, sans-serif';
  ctx.textAlign='center';
  ctx.fillText("Video → 3D Canvas · "+mode.toUpperCase(), W/2, H-16);
  ctx.restore();
}

// --- Interaction ---
let dragging=false, lastMX=0, lastMY=0;
canvas.addEventListener('mousedown',e=>{dragging=true;lastMX=e.clientX;lastMY=e.clientY;});
canvas.addEventListener('mousemove',e=>{
  if(!dragging)return;
  rotY+=(e.clientX-lastMX)*0.006;
  rotX+=(e.clientY-lastMY)*0.006;
  rotX=Math.max(-1.2,Math.min(1.2,rotX));
  lastMX=e.clientX;lastMY=e.clientY;
});
canvas.addEventListener('mouseup',()=>{dragging=false;});
canvas.addEventListener('mouseleave',()=>{dragging=false;});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom*=e.deltaY>0?0.95:1.05;
  zoom=Math.max(0.3,Math.min(3,zoom));
});

// Start
document.addEventListener('click', function() {
  video.play();
}, { once: true });

setInterval(render, 1000/30);
</script>

</body>
</html>
