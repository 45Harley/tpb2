// --- Voice ---
let claudiaVoice = null;
function pickVoice() {
  const v = speechSynthesis.getVoices();
  claudiaVoice = v.find(x => /female/i.test(x.name) && /en.US/i.test(x.lang))
    || v.find(x => /zira|eva|samantha|karen|susan/i.test(x.name))
    || v.find(x => x.lang && x.lang.startsWith('en'));
}
speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

let speaking = false;
function speak(text, delay) {
  if (delay) {
    setTimeout(() => speak(text), delay);
    return;
  }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85; u.pitch = 1.05;
  if (claudiaVoice) u.voice = claudiaVoice;
  u.onstart = () => { speaking = true; };
  u.onend = () => { speaking = false; };
  speechSynthesis.speak(u);
}

// Wait for current speech to finish, then speak next
function speakAfter(text) {
  const check = () => {
    if (!speaking && !speechSynthesis.speaking) {
      speak(text);
    } else {
      setTimeout(check, 200);
    }
  };
  setTimeout(check, 300);
}

// --- Background crowd murmur (procedural via Web Audio) ---
let audioCtx = null;
let crowdGain = null;
function startCrowdMurmur() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  crowdGain = audioCtx.createGain();
  crowdGain.gain.value = 0;
  crowdGain.connect(audioCtx.destination);

  // Layer filtered noise streams to simulate distant crowd
  for (let i = 0; i < 4; i++) {
    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let j = 0; j < bufSize; j++) {
      data[j] = (Math.random() * 2 - 1) * 0.5;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.loop = true;

    // Bandpass to sound like muffled voices
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 300 + i * 200; // 300-900 Hz range
    bp.Q.value = 0.8 + i * 0.3;

    // Slow amplitude modulation for natural pulsing
    const modGain = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.15 + i * 0.08;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.3;
    lfo.connect(lfoGain);
    lfoGain.connect(modGain.gain);

    src.connect(bp);
    bp.connect(modGain);
    modGain.connect(crowdGain);
    src.start(0, Math.random() * 2);
    lfo.start();
  }
}

function fadeCrowdIn(targetVol, duration) {
  if (!crowdGain) return;
  crowdGain.gain.linearRampToValueAtTime(targetVol, audioCtx.currentTime + duration);
}

// --- "America the Beautiful" — soft sine melody (public domain, MATERNA 1882) ---
let melodyGain = null;
function startMelody() {
  if (!audioCtx) return;
  melodyGain = audioCtx.createGain();
  melodyGain.gain.value = 0;
  melodyGain.connect(audioCtx.destination);

  // Notes: [frequency, duration in beats] — key of C, tempo ~72bpm (0.83s per beat)
  const C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392, A4=440;
  const melody = [
    // "O beautiful for spacious skies"
    [C4,1],[C4,1],[E4,1],[G4,1], [G4,1.5],[F4,0.5],[E4,1],[0,1],
    // "For amber waves of grain"
    [E4,1],[D4,1],[C4,1],[D4,1], [E4,2],[0,1],[0,1],
    // "For purple mountain majesties"
    [C4,1],[C4,1],[E4,1],[G4,1], [G4,1.5],[F4,0.5],[E4,1],[0,1],
    // "Above the fruited plain"
    [D4,1],[E4,1],[F4,1],[E4,1], [D4,2],[0,1],[0,1],
    // "America! America!"
    [E4,1],[E4,1],[E4,1],[F4,1], [G4,2],[G4,1],[A4,1],
    // "God shed His grace on thee"
    [A4,1],[G4,1],[F4,1],[E4,1], [F4,2],[0,1],[0,1],
    // "And crown thy good with brotherhood"
    [E4,1],[E4,1],[E4,1],[F4,1], [G4,1.5],[E4,0.5],[C4,1],[0,1],
    // "From sea to shining sea"
    [D4,1],[E4,1],[F4,0.5],[E4,0.5],[D4,1], [C4,3],[0,2],
  ];

  const beatLen = 0.85; // seconds per beat
  let totalBeats = 0;
  melody.forEach(n => totalBeats += n[1]);
  const loopLen = totalBeats * beatLen;

  function playCelloNote(freq, time, dur) {
    // --- Primary: sawtooth (rich bowed-string harmonics) ---
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    // Vibrato — slow pitch wobble like a bowed string
    const vibrato = audioCtx.createOscillator();
    vibrato.type = 'sine';
    vibrato.frequency.value = 5.5; // ~5.5Hz vibrato rate
    const vibGain = audioCtx.createGain();
    vibGain.gain.value = freq * 0.006; // subtle pitch bend
    vibrato.connect(vibGain);
    vibGain.connect(osc.frequency);

    // Low-pass filter — tames harshness, gives warmth
    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = freq * 3; // allow first few harmonics through
    lpf.Q.value = 0.7;

    // Slow bow attack, sustained, gentle release
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(0.7, time + 0.18); // slow bow attack
    env.gain.setValueAtTime(0.7, time + dur - 0.2);
    env.gain.linearRampToValueAtTime(0, time + dur); // bow lift

    // --- Second voice: triangle one octave lower for body ---
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 0.5;
    const env2 = audioCtx.createGain();
    env2.gain.setValueAtTime(0, time);
    env2.gain.linearRampToValueAtTime(0.25, time + 0.2);
    env2.gain.setValueAtTime(0.25, time + dur - 0.2);
    env2.gain.linearRampToValueAtTime(0, time + dur);

    // --- Third voice: sine at pitch for core tone ---
    const osc3 = audioCtx.createOscillator();
    osc3.type = 'sine';
    osc3.frequency.value = freq;
    const env3 = audioCtx.createGain();
    env3.gain.setValueAtTime(0, time);
    env3.gain.linearRampToValueAtTime(0.35, time + 0.15);
    env3.gain.setValueAtTime(0.35, time + dur - 0.15);
    env3.gain.linearRampToValueAtTime(0, time + dur);

    // Wire up
    osc.connect(lpf);
    lpf.connect(env);
    env.connect(melodyGain);
    osc2.connect(env2);
    env2.connect(melodyGain);
    osc3.connect(env3);
    env3.connect(melodyGain);

    osc.start(time); osc.stop(time + dur + 0.05);
    vibrato.start(time); vibrato.stop(time + dur + 0.05);
    osc2.start(time); osc2.stop(time + dur + 0.05);
    osc3.start(time); osc3.stop(time + dur + 0.05);
  }

  function scheduleLoop(startTime) {
    let time = startTime;
    melody.forEach(([freq, beats]) => {
      if (freq > 0) {
        const dur = beats * beatLen * 0.9;
        playCelloNote(freq, time, dur);
      }
      time += beats * beatLen;
    });

    // Schedule next loop
    setTimeout(() => scheduleLoop(audioCtx.currentTime + 0.5), (loopLen - 2) * 1000);
  }

  scheduleLoop(audioCtx.currentTime + 0.5);
}

function fadeMelodyIn(targetVol, duration) {
  if (!melodyGain) return;
  melodyGain.gain.linearRampToValueAtTime(targetVol, audioCtx.currentTime + duration);
}

// --- Procedural brick texture ---
function makeBrickTexture() {
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 512;
  const c = cv.getContext('2d');

  // Base color
  c.fillStyle = '#5a3a2a';
  c.fillRect(0, 0, 512, 512);

  const bw = 64, bh = 28, gap = 3;
  for (let row = 0; row < 20; row++) {
    const offset = (row % 2) * (bw / 2);
    for (let col = -1; col < 9; col++) {
      const x = col * (bw + gap) + offset;
      const y = row * (bh + gap);

      // Brick color variation
      const r = 140 + Math.random() * 40 - 20;
      const g = 60 + Math.random() * 30 - 15;
      const b = 40 + Math.random() * 20 - 10;
      c.fillStyle = `rgb(${r},${g},${b})`;
      c.fillRect(x, y, bw, bh);

      // Slight texture noise
      for (let i = 0; i < 20; i++) {
        c.fillStyle = `rgba(0,0,0,${Math.random()*0.15})`;
        c.fillRect(x + Math.random()*bw, y + Math.random()*bh, 2, 2);
      }
    }
  }

  // Mortar color
  c.globalCompositeOperation = 'destination-over';
  c.fillStyle = '#3a3a3a';
  c.fillRect(0, 0, 512, 512);
  c.globalCompositeOperation = 'source-over';

  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(3, 3);
  return tex;
}

function makeWoodTexture() {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 512;
  const c = cv.getContext('2d');

  // Base wood
  c.fillStyle = '#6b4226';
  c.fillRect(0, 0, 256, 512);

  // Wood grain lines
  for (let i = 0; i < 60; i++) {
    const y = Math.random() * 512;
    c.strokeStyle = `rgba(${80+Math.random()*40}, ${40+Math.random()*20}, ${20+Math.random()*15}, ${0.2+Math.random()*0.3})`;
    c.lineWidth = 1 + Math.random() * 2;
    c.beginPath();
    c.moveTo(0, y);
    for (let x = 0; x < 256; x += 20) {
      c.lineTo(x, y + Math.sin(x * 0.05) * 3 + (Math.random()-0.5)*2);
    }
    c.stroke();
  }

  // Panel grooves
  c.strokeStyle = 'rgba(0,0,0,0.3)';
  c.lineWidth = 2;
  c.strokeRect(30, 40, 196, 180);
  c.strokeRect(30, 260, 196, 180);

  // Panel highlights
  c.strokeStyle = 'rgba(255,200,100,0.08)';
  c.lineWidth = 1;
  c.strokeRect(32, 42, 192, 176);
  c.strokeRect(32, 262, 192, 176);

  return new THREE.CanvasTexture(cv);
}

// --- Declaration of Independence (left wall) ---
function makeDocTexture(title, lines, accent) {
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 640;
  const c = cv.getContext('2d');

  // Parchment background
  c.fillStyle = '#f4e8c1';
  c.fillRect(0, 0, 512, 640);
  // Aged edges
  for (let i = 0; i < 200; i++) {
    c.fillStyle = `rgba(180,150,100,${Math.random()*0.15})`;
    c.fillRect(Math.random()*512, Math.random()*640, Math.random()*30+2, Math.random()*3+1);
  }

  // Gold ornamental border
  c.strokeStyle = accent || '#8b6914';
  c.lineWidth = 6;
  c.strokeRect(16, 16, 480, 608);
  c.strokeStyle = accent || '#8b6914';
  c.lineWidth = 2;
  c.strokeRect(24, 24, 464, 592);

  // Title
  c.fillStyle = '#000000';
  c.font = '700 28px Georgia, serif';
  c.textAlign = 'center';
  c.fillText(title, 256, 60);

  // Decorative line under title
  c.strokeStyle = '#8b6914';
  c.lineWidth = 1.5;
  c.beginPath();
  c.moveTo(100, 75); c.lineTo(412, 75);
  c.stroke();

  // Body text
  c.font = '400 16px Georgia, serif';
  c.fillStyle = '#1a0a00';
  c.textAlign = 'left';
  let y = 100;
  lines.forEach(line => {
    // Word wrap
    const words = line.split(' ');
    let current = '';
    words.forEach(w => {
      const test = current + w + ' ';
      if (c.measureText(test).width > 440) {
        c.fillText(current.trim(), 40, y);
        y += 20;
        current = w + ' ';
      } else {
        current = test;
      }
    });
    if (current.trim()) { c.fillText(current.trim(), 40, y); y += 20; }
    y += 8; // paragraph spacing
  });

  return new THREE.CanvasTexture(cv);
}

);
grFrame.position.set(2.99, 2.2, -2);
grFrame.rotation.y = -Math.PI / 2;
scene.add(grFrame);

// Gold frame border (right document)
const grBorder = new THREE.Mesh(
  new THREE.PlaneGeometry(2.4, 3.0),
  new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.3, metalness: 0.7 })
);
grBorder.position.set(2.995, 2.2, -2);
grBorder.rotation.y = -Math.PI / 2;
scene.add(grBorder);

// Alcove lights to illuminate the documents
const docLightL = new THREE.PointLight(0xffeedd, 0.8, 5);
docLightL.position.set(-2.5, 3.5, -2);
scene.add(docLightL);
const docLightR = new THREE.PointLight(0xffeedd, 0.8, 5);
docLightR.position.set(2.5, 3.5, -2);
scene.add(docLightR);

// --- Torch sconces (simple geometry) ---
function addTorch(x) {
  const sconce = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.06, 0.3, 8),
    new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.4 })
  );
  sconce.position.set(x, 2.8, 0.15);
  scene.add(sconce);

  // Flame (glowing sphere)
  const flame = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff6600 })
  );
  flame.position.set(x, 3.0, 0.15);
  flame.name = x < 0 ? 'flameL' : 'flameR';
  scene.add(flame);
}
addTorch(-2.5);
addTorch(2.5);

// --- State machine ---
let state = 'idle';     // idle, introducing, approaching, arrived, opening, open, entering, looking, inside
let camZ = 8;
let doorAngle = 0;
let lookPhase = 0;
let lookNarration = 0;
let lookX = 0, lookY = 1.8;
let t = 0;

// --- Mouse free-look + zoom (active in 'inside' state) ---
canvas.addEventListener('mousemove', (e) => {
  if (state !== 'inside') return;
  const rect = canvas.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / 900) * 2 - 1;  // -1 to 1
  const my = ((e.clientY - rect.top) / 520) * 2 - 1;
  lookX = mx * 3;           // pan left/right up to 3 units
  lookY = 1.8 - my * 1.5;   // pan up/down
});

canvas.addEventListener('wheel', (e) => {
  if (state !== 'inside') return;
  e.preventDefault();
  camZ += e.deltaY > 0 ? 0.15 : -0.15;
  camZ = Math.max(-4, Math.min(0, camZ));
  camera.position.z = camZ;
});

// --- Raycaster for knob click ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / 900) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / 520) * 2 + 1;

  if (state === 'idle') {
    state = 'introducing';
    nText.textContent = "Hi, my name is Claudia. I am your guide to The People's Branch.";
    speak("Hi, my name is Claudia. I am your guide to The People's Branch.");
  } else if (state === 'arrived') {
    // Check if clicked on knob
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects([knob, plate, door]);
    if (hits.length > 0) {
      state = 'opening';
      nText.textContent = "Opening the door...";
      speak("Welcome to The People's Branch.");
    }
  } else if (state === 'open') {
    // Walk through
    state = 'entering';
    nText.textContent = "Entering...";
    speak("Step inside. Your voice matters here.");
  } else if (state === 'inside') {
    raycaster.setFromCamera(mouse, camera);
    // Check documents first
    const docHits = raycaster.intersectObjects([doiFrame, grFrame]);
    if (docHits.length > 0) {
      const hit = docHits[0].object;
      if (hit === doiFrame) {
        nText.textContent = "Opening the Declaration of Independence...";
        speak("The Declaration of Independence.");
        window.open('/usa/docs/declaration.php', '_blank');
      } else if (hit === grFrame) {
        nText.textContent = "Opening the Golden Rule...";
        speak("The Golden Rule.");
        window.open('/goldenrule.html', '_blank');
      }
      return;
    }
    // Click banner to go to TPB home
    const hits = raycaster.intersectObjects([pbPlane, glowPlane]);
    if (hits.length > 0) {
      nText.textContent = "Entering The People's Branch...";
      speak("Welcome home.");
      setTimeout(() => { window.location.href = '/index.php'; }, 2000);
    }
  }
});

// --- Behind the door: PeoplesBranch.png on a lit plane ---
const behindLight = new THREE.PointLight(0xd4af37, 0, 15);
behindLight.position.set(0, 2, -2);
scene.add(behindLight);

const pbLoader = new THREE.TextureLoader();
const pbTex = pbLoader.load('/0media/PeoplesBranch.png');
const pbPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(4, 3),
  new THREE.MeshBasicMaterial({ map: pbTex, transparent: false })
);
pbPlane.position.set(0, 1.8, -3);
scene.add(pbPlane);

// Glow frame around PB image
const glowPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(4.3, 3.3),
  new THREE.MeshBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0 })
);
glowPlane.position.set(0, 1.8, -3.01);
scene.add(glowPlane);

// --- Animate ---
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Torch flicker
  const flameL = scene.getObjectByName('flameL');
  const flameR = scene.getObjectByName('flameR');
  if (flameL) {
    flameL.scale.setScalar(0.8 + Math.sin(t*15)*0.3 + Math.sin(t*23)*0.15);
    torch1.intensity = 1.0 + Math.sin(t*12)*0.3;
  }
  if (flameR) {
    flameR.scale.setScalar(0.8 + Math.sin(t*17+1)*0.3 + Math.sin(t*19)*0.15);
    torch2.intensity = 1.0 + Math.sin(t*14+2)*0.3;
  }

  // State transitions
  if (state === 'introducing') {
    // Wait for Claudia's intro to finish, then start walking
    if (!speaking && !speechSynthesis.speaking) {
      state = 'approaching';
      nText.textContent = "Walking forward...";
      speak("Let me walk you to the door.");
    }
  }

  if (state === 'approaching') {
    camZ -= 0.02;  // slower walk
    camera.position.z = camZ;
    camera.lookAt(0, 1.5, 0);
    if (camZ <= 3) {
      state = 'arrived';
      nText.textContent = "Click the door knob to open.";
      speak("Click the knob.");
    }
  }

  if (state === 'opening') {
    doorAngle += 0.006;  // very slow door swing
    doorGroup.rotation.y = -doorAngle;
    behindLight.intensity = doorAngle * 2;
    glowPlane.material.opacity = Math.min(0.25, doorAngle * 0.3);

    // Start crowd murmur as door cracks open
    if (doorAngle > 0.3 && !audioCtx) {
      startCrowdMurmur();
      fadeCrowdIn(0.06, 4);
      startMelody();
      fadeMelodyIn(0.04, 6);
    }

    if (doorAngle >= Math.PI * 0.45) {
      state = 'open';
      nText.textContent = "Come on in. Click to walk through.";
      speak("Come on in.");
      fadeCrowdIn(0.1, 3);
      fadeMelodyIn(0.06, 3);
    }
  }

  if (state === 'entering') {
    camZ -= 0.008;  // very slow walk through doorway
    camera.position.z = camZ;
    camera.lookAt(0, 1.8, -3);
    behindLight.intensity = Math.min(5, behindLight.intensity + 0.03);
    glowPlane.material.opacity = Math.min(0.4, glowPlane.material.opacity + 0.003);
    fadeCrowdIn(0.15, 2);

    if (camZ <= -1.5) {
      state = 'looking';
      lookPhase = 0;
      lookNarration = 0;
      nText.textContent = "Looking around...";
      speak("Welcome. Let me show you around.");
      scene.fog.near = 20;
      scene.fog.far = 50;
      fadeCrowdIn(0.2, 3);
      fadeMelodyIn(0.08, 4);
    }
  }

  // Look around the room — slow, cinematic panning with narration
  if (state === 'looking') {
    lookPhase += 0.0018;  // ultra slow — full sequence ~55 seconds

    // At 0.0018/frame @ 60fps:
    // Phase 0-1 = ~9s, 1-1.8 = ~7s pause, 1.8-3.5 = ~16s pan, 3.5-4.3 = ~7s pause
    // Phase 4.3-5.5 = ~11s up+center, 5.5-6.5 = ~9s settle, 6.5-7.5 = ~9s hold

    // Phase 0-1: Slow pan left (~9s — speech "This is where the people gather" ~2.5s fits)
    if (lookPhase < 1) {
      const ease = Math.sin(lookPhase * Math.PI * 0.5);
      camera.lookAt(ease * -2.5, 1.8, -3);
      if (lookNarration === 0) {
        lookNarration = 1;
        nText.textContent = "The Declaration of Independence. Where it all began.";
        speakAfter("The Declaration of Independence. Where it all began.");
      }
    }
    // Phase 1-1.8: Pause left (~7s — silence, let crowd murmur breathe)
    else if (lookPhase < 1.8) {
      camera.lookAt(-2.5, 1.8, -3);
    }
    // Phase 1.8-3.5: Pan left to right (~16s — speech "Every voice matters" ~4s, rest is visual)
    else if (lookPhase < 3.5) {
      const p = (lookPhase - 1.8) / 1.7;
      const ease = Math.sin(p * Math.PI);
      camera.lookAt(-2.5 + ease * 5, 1.8, -3);
      if (lookNarration === 1) {
        lookNarration = 2;
        nText.textContent = "The Golden Rule. The foundation of it all.";
        speakAfter("The Golden Rule. Do to others what you would have them do to you. The foundation of it all.");
      }
    }
    // Phase 3.5-4.3: Pause right (~7s — silence)
    else if (lookPhase < 4.3) {
      camera.lookAt(2.5, 1.8, -3);
    }
    // Phase 4.3-5.5: Pan back to center, look up (~11s — speech "The fractal" ~5s)
    else if (lookPhase < 5.5) {
      const p = (lookPhase - 4.3) / 1.2;
      camera.lookAt(2.5 - p * 2.5, 1.8 + Math.sin(p * Math.PI) * 2, -3);
      if (lookNarration === 2) {
        lookNarration = 3;
        nText.textContent = "The same structure at every level.";
        speakAfter("The same structure at every level. The fractal of self governance.");
      }
    }
    // Phase 5.5-6.5: Slowly settle back to PB image (~9s — silence)
    else if (lookPhase < 6.5) {
      const p = (lookPhase - 5.5);
      const ly = 1.8 + (1 - p) * 0.5;
      camera.lookAt(0, ly, -3);
    }
    // Phase 6.5-7.5: Hold on PB image (~9s — speech "To build" ~2.5s then silence)
    else if (lookPhase < 7.5) {
      camera.lookAt(0, 1.8, -3);
      if (lookNarration === 3) {
        lookNarration = 4;
        nText.textContent = "To build a more perfect union.";
        speakAfter("To build a more perfect union.");
      }
    }
    else {
      state = 'inside';
      nText.textContent = "Welcome to The People's Branch. Click the banner to enter.";
      speakAfter("Click the banner to enter The People's Branch.");
      fadeCrowdIn(0.1, 4);
      fadeMelodyIn(0.06, 4);
    }
  }

  // Free look when inside — mouse controls camera direction
  if (state === 'inside') {
    camera.lookAt(
      lookX + Math.sin(t * 0.2) * 0.02,
      lookY + Math.sin(t * 0.15) * 0.01,
      -3
    );
  }

  renderer.render(scene, camera);
}

animate();
</script>
