<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPB Map Transition Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 800px;
    height: 500px;
  }

  .scene {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene.active {
    opacity: 1;
  }

  .scene svg {
    max-width: 100%;
    max-height: 100%;
  }

  /* Claudia narration bar */
  .narration {
    margin-top: 30px;
    text-align: center;
    font-size: 1.2rem;
    color: #b0b0b0;
    min-height: 60px;
    transition: opacity 0.4s;
  }
  .narration .speaker {
    color: #d4af37;
    font-weight: 600;
  }

  /* Controls */
  .controls {
    margin-top: 24px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    padding: 10px 24px;
    border-radius: 20px;
    border: 1px solid #d4af37;
    background: transparent;
    color: #d4af37;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .controls button:hover {
    background: #d4af37;
    color: #000;
  }
  .controls button.active {
    background: #d4af37;
    color: #000;
  }

  /* Pulsing dot */
  @keyframes pulse {
    0%, 100% { r: 6; opacity: 1; }
    50% { r: 10; opacity: 0.6; }
  }
  .pulse-dot {
    animation: pulse 2s ease-in-out infinite;
  }

  /* Road animation */
  @keyframes roadFlow {
    from { stroke-dashoffset: 20; }
    to { stroke-dashoffset: 0; }
  }
  .road-animated {
    stroke-dasharray: 10 10;
    animation: roadFlow 1s linear infinite;
  }

  /* Glow effect */
  .glow {
    filter: drop-shadow(0 0 6px #d4af37);
  }

  /* Auto-play indicator */
  .auto-label {
    margin-top: 16px;
    font-size: 0.8rem;
    color: #555;
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Scene 1: TPB Logo / Function Map -->
  <div class="scene active" id="scene1">
    <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
      <!-- Background glow -->
      <defs>
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1a1a3e" />
          <stop offset="100%" stop-color="#0d0d1a" />
        </radialGradient>
        <filter id="goldGlow">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <rect width="800" height="500" fill="url(#bgGlow)" />

      <!-- TPB Text -->
      <text x="400" y="80" text-anchor="middle" font-size="42" font-weight="700" fill="#d4af37" filter="url(#goldGlow)">The People's Branch</text>
      <text x="400" y="115" text-anchor="middle" font-size="16" fill="#b0b0b0">To build a more perfect union</text>

      <!-- Function nodes -->
      <!-- Row 1: Spirit / Thought / Instrument -->
      <circle cx="200" cy="200" r="30" fill="#1a1a2e" stroke="#d4af37" stroke-width="2" />
      <text x="200" y="205" text-anchor="middle" font-size="11" fill="#d4af37">Spirit</text>

      <circle cx="400" cy="200" r="30" fill="#1a1a2e" stroke="#d4af37" stroke-width="2" />
      <text x="400" y="205" text-anchor="middle" font-size="11" fill="#d4af37">Thought</text>

      <circle cx="600" cy="200" r="30" fill="#1a1a2e" stroke="#d4af37" stroke-width="2" />
      <text x="600" y="205" text-anchor="middle" font-size="11" fill="#d4af37">Instrument</text>

      <!-- Roads row 1 -->
      <line x1="230" y1="200" x2="370" y2="200" stroke="#d4af37" stroke-width="1.5" opacity="0.5" class="road-animated" />
      <line x1="430" y1="200" x2="570" y2="200" stroke="#d4af37" stroke-width="1.5" opacity="0.5" class="road-animated" />

      <!-- Row 2: Polls > Ballots > Groups > Mandates > Beam -->
      <circle cx="100" cy="340" r="24" fill="#1a1a2e" stroke="#62a4d0" stroke-width="2" />
      <text x="100" y="344" text-anchor="middle" font-size="10" fill="#62a4d0">Polls</text>

      <circle cx="240" cy="340" r="24" fill="#1a1a2e" stroke="#62a4d0" stroke-width="2" />
      <text x="240" y="344" text-anchor="middle" font-size="10" fill="#62a4d0">Ballots</text>

      <circle cx="400" cy="340" r="24" fill="#1a1a2e" stroke="#62a4d0" stroke-width="2" />
      <text x="400" y="344" text-anchor="middle" font-size="10" fill="#62a4d0">Groups</text>

      <circle cx="560" cy="340" r="24" fill="#1a1a2e" stroke="#62a4d0" stroke-width="2" />
      <text x="560" y="344" text-anchor="middle" font-size="10" fill="#62a4d0">Mandates</text>

      <circle cx="700" cy="340" r="24" fill="#1a1a2e" stroke="#62a4d0" stroke-width="2" />
      <text x="700" y="344" text-anchor="middle" font-size="10" fill="#62a4d0">Beam</text>

      <!-- Roads row 2 -->
      <line x1="124" y1="340" x2="216" y2="340" stroke="#62a4d0" stroke-width="1.5" opacity="0.4" class="road-animated" />
      <line x1="264" y1="340" x2="376" y2="340" stroke="#62a4d0" stroke-width="1.5" opacity="0.4" class="road-animated" />
      <line x1="424" y1="340" x2="536" y2="340" stroke="#62a4d0" stroke-width="1.5" opacity="0.4" class="road-animated" />
      <line x1="584" y1="340" x2="676" y2="340" stroke="#62a4d0" stroke-width="1.5" opacity="0.4" class="road-animated" />

      <!-- Vertical roads: Thought feeds engine -->
      <line x1="400" y1="230" x2="400" y2="316" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="4 4" />
      <line x1="200" y1="230" x2="100" y2="316" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="4 4" />
      <line x1="600" y1="230" x2="700" y2="316" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="4 4" />

      <!-- Bottom label -->
      <text x="400" y="440" text-anchor="middle" font-size="13" fill="#555">The Civic Engine</text>
    </svg>
  </div>

  <!-- Scene 2: USA State Map -->
  <div class="scene" id="scene2">
    <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="800" height="500" fill="#0d0d1a" />

      <text x="400" y="40" text-anchor="middle" font-size="20" fill="#d4af37">The United States of America</text>
      <text x="400" y="62" text-anchor="middle" font-size="12" fill="#666">Citizens building across the country</text>

      <!-- Simplified USA outline -->
      <g transform="translate(80, 60) scale(0.85)">
        <!-- Continental US simplified path -->
        <path d="M 120 150 L 140 120 L 180 100 L 220 95 L 260 90 L 300 85 L 340 80 L 380 82 L 420 78 L 460 80 L 500 85 L 520 90 L 540 100 L 560 95 L 580 100 L 600 110 L 620 120 L 640 115 L 660 120 L 680 130 L 700 140 L 710 160 L 700 180 L 690 200 L 680 220 L 670 240 L 660 260 L 650 280 L 640 300 L 620 310 L 600 320 L 580 330 L 560 340 L 540 345 L 520 340 L 500 335 L 480 340 L 460 350 L 440 355 L 420 360 L 400 365 L 380 360 L 360 355 L 340 360 L 320 365 L 300 360 L 280 355 L 260 360 L 240 370 L 220 375 L 200 370 L 180 360 L 160 345 L 140 330 L 120 310 L 110 290 L 100 270 L 95 250 L 90 230 L 95 210 L 100 190 L 110 170 Z"
              fill="#1a1a2e" stroke="#333" stroke-width="2" />

        <!-- State dots - sampling of states with activity -->
        <!-- CT - highlighted -->
        <circle cx="670" cy="155" r="8" fill="#d4af37" class="pulse-dot" />
        <text x="670" y="145" text-anchor="middle" font-size="10" fill="#d4af37" font-weight="700">CT</text>

        <!-- Other states - dimmer -->
        <circle cx="640" cy="170" r="4" fill="#62a4d0" opacity="0.5" />
        <text x="640" y="183" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.5">NJ</text>

        <circle cx="620" cy="155" r="4" fill="#62a4d0" opacity="0.5" />
        <text x="620" y="148" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.5">NY</text>

        <circle cx="600" cy="175" r="4" fill="#62a4d0" opacity="0.5" />
        <text x="600" y="188" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.5">PA</text>

        <circle cx="500" cy="200" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="500" y="213" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">OH</text>

        <circle cx="420" cy="210" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="420" y="223" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">IL</text>

        <circle cx="200" cy="220" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="200" y="233" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">CA</text>

        <circle cx="300" cy="300" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="300" y="313" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">TX</text>

        <circle cx="550" cy="280" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="550" y="293" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">GA</text>

        <circle cx="580" cy="310" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="580" y="323" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">FL</text>

        <circle cx="340" cy="170" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="340" y="183" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">MN</text>

        <circle cx="250" cy="140" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="250" y="153" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">MT</text>

        <circle cx="160" cy="160" r="4" fill="#62a4d0" opacity="0.3" />
        <text x="160" y="173" text-anchor="middle" font-size="8" fill="#62a4d0" opacity="0.3">WA</text>
      </g>

      <!-- Legend -->
      <circle cx="100" cy="460" r="5" fill="#d4af37" />
      <text x="112" y="464" font-size="11" fill="#b0b0b0">Your state</text>
      <circle cx="220" cy="460" r="4" fill="#62a4d0" opacity="0.5" />
      <text x="232" y="464" font-size="11" fill="#b0b0b0">Active</text>
      <circle cx="320" cy="460" r="4" fill="#62a4d0" opacity="0.3" />
      <text x="332" y="464" font-size="11" fill="#b0b0b0">Building</text>
    </svg>
  </div>

  <!-- Scene 3: CT Map with Putnam -->
  <div class="scene" id="scene3">
    <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="800" height="500" fill="#0d0d1a" />

      <text x="400" y="40" text-anchor="middle" font-size="20" fill="#d4af37">Connecticut</text>
      <text x="400" y="62" text-anchor="middle" font-size="12" fill="#666">Your home state</text>

      <!-- Simplified CT outline -->
      <g transform="translate(100, 80)">
        <path d="M 50 100 L 80 70 L 130 50 L 200 40 L 280 35 L 360 30 L 440 35 L 500 45 L 550 60 L 580 80 L 590 110 L 585 140 L 575 170 L 560 200 L 540 230 L 510 260 L 470 280 L 420 290 L 360 295 L 300 290 L 240 285 L 180 280 L 130 265 L 90 240 L 65 210 L 50 180 L 45 150 L 45 120 Z"
              fill="#1a1a2e" stroke="#d4af37" stroke-width="2" opacity="0.8" />

        <!-- County/region lines (simplified) -->
        <line x1="200" y1="40" x2="200" y2="290" stroke="#333" stroke-width="1" opacity="0.3" />
        <line x1="360" y1="30" x2="360" y2="295" stroke="#333" stroke-width="1" opacity="0.3" />
        <line x1="500" y1="45" x2="470" y2="280" stroke="#333" stroke-width="1" opacity="0.3" />

        <!-- Town labels (dimmed) -->
        <text x="120" y="180" text-anchor="middle" font-size="10" fill="#555">Danbury</text>
        <text x="280" y="200" text-anchor="middle" font-size="10" fill="#555">Hartford</text>
        <text x="440" y="180" text-anchor="middle" font-size="10" fill="#555">Norwich</text>
        <text x="200" y="260" text-anchor="middle" font-size="10" fill="#555">Bridgeport</text>
        <text x="340" y="260" text-anchor="middle" font-size="10" fill="#555">New Haven</text>
        <text x="520" y="140" text-anchor="middle" font-size="10" fill="#555">Willimantic</text>

        <!-- PUTNAM - highlighted with pulse -->
        <circle cx="520" cy="75" r="8" fill="#d4af37" class="pulse-dot" />
        <text x="520" y="60" text-anchor="middle" font-size="14" fill="#d4af37" font-weight="700">Putnam</text>
        <text x="520" y="100" text-anchor="middle" font-size="9" fill="#b0b0b0">41.9148° N, 71.9009° W</text>

        <!-- Delegation info box -->
        <rect x="320" y="330" width="260" height="70" rx="8" fill="#1a1a2e" stroke="#d4af37" stroke-width="1" opacity="0.9" />
        <text x="450" y="352" text-anchor="middle" font-size="11" fill="#d4af37">Your Delegation</text>
        <text x="450" y="372" text-anchor="middle" font-size="10" fill="#b0b0b0">CT-02 · U.S. Congress</text>
        <text x="450" y="390" text-anchor="middle" font-size="10" fill="#b0b0b0">2 Senators · 1 Representative</text>
      </g>
    </svg>
  </div>

</div>

<!-- Claudia narration -->
<div class="narration" id="narration">
  <span class="speaker">Claudia:</span> <span id="narrationText">Welcome to The People's Branch.</span>
</div>

<!-- Controls -->
<div class="controls">
  <button class="active" onclick="goTo(0)">The Branch</button>
  <button onclick="goTo(1)">The Nation</button>
  <button onclick="goTo(2)">Your Home</button>
</div>
<div class="auto-label">Auto-plays every 4 seconds · Click to jump</div>

<script>
  const scenes = [
    document.getElementById('scene1'),
    document.getElementById('scene2'),
    document.getElementById('scene3')
  ];
  const narrations = [
    "Welcome to The People's Branch.",
    "Here's where citizens are building across the country.",
    "And here's Putnam — your home. Let's see what's happening."
  ];
  const buttons = document.querySelectorAll('.controls button');
  const narrationText = document.getElementById('narrationText');

  let current = 0;
  let autoTimer = null;
  let claudiaVoice = null;

  // Find a female US English voice
  function pickVoice() {
    const voices = speechSynthesis.getVoices();
    claudiaVoice = voices.find(v => /female/i.test(v.name) && /en.US/i.test(v.lang))
      || voices.find(v => /zira|eva|samantha|karen|susan/i.test(v.name))
      || voices.find(v => v.lang && v.lang.startsWith('en'));
  }
  speechSynthesis.onvoiceschanged = pickVoice;
  pickVoice();

  function speak(text) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95;
    u.pitch = 1.05;
    if (claudiaVoice) u.voice = claudiaVoice;
    speechSynthesis.speak(u);
  }

  function goTo(index) {
    scenes[current].classList.remove('active');
    buttons[current].classList.remove('active');
    current = index;
    scenes[current].classList.add('active');
    buttons[current].classList.add('active');
    narrationText.textContent = narrations[current];
    speak(narrations[current]);
    resetAuto();
  }

  function next() {
    goTo((current + 1) % scenes.length);
  }

  function resetAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(next, 5000);
  }

  // Browser requires user interaction before speech — start on first click
  let started = false;
  document.addEventListener('click', function() {
    if (!started) {
      started = true;
      speak(narrations[current]);
    }
  }, { once: true });

  resetAuto();
</script>

</body>
</html>
