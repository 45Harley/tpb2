<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Perfect — Civil Rights & Vietnam (1960–1975)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  .stage { display: flex; align-items: flex-start; gap: 12px; margin-top: 8px; }
  .side-panel { width: 160px; min-width: 120px; display: flex; flex-direction: column; gap: 3px; padding-top: 4px; }
  .side-panel .tl-item { padding: 5px 8px; border-radius: 3px; font: 13px/1.3 'Segoe UI', system-ui, sans-serif; color: #ccc; border: 1px solid transparent; white-space: nowrap; transition: all 0.3s; cursor: pointer; }
  .side-panel .tl-item:hover { background: #2a2a4e; color: #fff; }
  .side-panel .tl-item.active { border-color: #fff; color: #fff; font-weight: 700; }
  .side-panel .tl-act-label { font: 700 12px/1.3 'Segoe UI', system-ui, sans-serif; color: #888; padding: 6px 6px 2px; text-transform: uppercase; letter-spacing: 1px; }
  canvas { cursor: pointer; border-radius: 8px; width: min(900px, calc(100vw - 340px)); height: auto; }
  .controls { position: fixed; top: 12px; right: 16px; display: flex; gap: 8px; z-index: 10; }
  .controls button { background: #1a1a2e; border: 1px solid #666; color: #ccc; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .controls button.active { border-color: #d4af37; color: #d4af37; }
  .controls button:hover { border-color: #555; color: #ccc; }
  .narration { margin-top: 14px; text-align: center; font-size: 1rem; color: #b0b0b0; min-height: 28px; max-width: 700px; }
  .hint { margin-top: 6px; font-size: 0.8rem; color: #d4af37; text-align: center; min-height: 18px; }
</style>
</head>
<body>
<div class="controls">
  <button id="audioBtn" onclick="toggleAudio()">Audio Off</button>
</div>
<div class="stage" id="stage">
  <div class="side-panel" id="timeline-left"></div>
  <div id="center-panel">
    <canvas id="c" width="900" height="480"></canvas>
    <div class="narration" id="narration"></div>
    <div class="hint" id="hint">Click to begin</div>
  </div>
  <div class="side-panel" id="timeline-right"></div>
</div>
<script src="engine.js"></script>
<script>
// ========================================
// DATA
// ========================================
const CIVIL_RIGHTS_WORDS = [
  { label: 'Equal Protection', color: '#f0d060', positive: true },
  { label: 'Voting Rights', color: '#e8c840', positive: true },
  { label: 'Justice', color: '#f0d060', positive: true },
  { label: 'I Have a Dream', color: '#ffe088', positive: true },
  { label: 'Peaceful Protest', color: '#e8c840', positive: true },
  { label: 'Truth to Power', color: '#f0d060', positive: true },
  { label: 'Freedom Riders', color: '#ffe077', positive: true },
  { label: 'Selma', color: '#f0d060', positive: true },
  { label: 'March on Washington', color: '#ffe088', positive: true },
];

const CR_VINES = [
  { label: 'Segregation', color: '#cc4444', startX: 150, startY: H - 18, angle: -Math.PI * 0.4 },
  { label: 'Jim Crow', color: '#bb5533', startX: 450, startY: H - 18, angle: -Math.PI * 0.55 },
  { label: 'Inequality', color: '#aa4455', startX: 700, startY: H - 20, angle: -Math.PI * 0.65 },
];

const CR_VINES_2 = [
  { color: '#cc4444', startX: 150, startY: H - 18 },
  { color: '#bb5533', startX: 450, startY: H - 18 },
  { color: '#aa4455', startX: 700, startY: H - 20 },
];

// ========================================
// PHASES
// ========================================
const PHASES = [
  { id: 'swirl-civil-rights', label: 'The Unfinished Promise' },
  { id: 'friction-civil-rights', label: 'Civil Rights' },
];

phase = 'swirl-civil-rights';

// ========================================
// RENDER
// ========================================
function render(now) {
  const dt = beginFrame(now);
  updateTimeline(phase);

  // --- Swirl: 3 vines entangle the sphere, orbiting reform words ---
  if (phase === 'swirl-civil-rights') {
    drawTitle('The Unfinished Promise — 1960–1975', 0.5);
    phaseT += dt;

    // Draw vines growing toward and entangling the sphere
    drawVinesGrowing(CR_VINES, phaseT, now);

    // Government sphere — vibrating, resisting the vines
    const resistance = Math.min(1, phaseT / 4);
    const jitter = resistance * 6;
    const jx = (Math.random()-0.5) * jitter;
    const jy = (Math.random()-0.5) * jitter;
    const breathe = Math.sin(now / 300) * (2 + resistance * 4);
    drawSphere(W/2 + jx, H/2 + jy, 95 + breathe, GOLD, 'Constitutional Government', 0.8);

    // Spawn orbiting protector words
    if (phaseT < 5) {
      const spawnInterval = 5 / (CIVIL_RIGHTS_WORDS.length - 1);
      const shouldHave = Math.min(CIVIL_RIGHTS_WORDS.length, Math.floor(phaseT / spawnInterval) + 1);
      while (floatingWords.length < shouldHave && floatingWords.length < CIVIL_RIGHTS_WORDS.length) {
        const def = CIVIL_RIGHTS_WORDS[floatingWords.length];
        const w = makeWord(def.label, false, def.color);
        w.fontSize = 16; w.baseFontSize = 16;
        w.orbiting = true; w.orbitReady = false; w.protector = true;
        floatingWords.push(w);
      }
    }

    // Orbit + protect behavior
    floatingWords.forEach(w => {
      if (w.phase === 'drifting' || w.phase === 'entering' || w.phase === 'winning') {
        const dx = w.x - W/2, dy = w.y - H/2;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        if (!w.orbitReady) {
          w.vx += (W/2 - w.x) * 0.06 * dt;
          w.vy += (H/2 - w.y) * 0.06 * dt;
          w.fontSize = Math.min(w.baseFontSize * 1.3, w.fontSize + dt * 2);
          if (d < 170 || w.life > 3) { w.orbitReady = true; w.orbiting = true; }
        }
        if (w.orbiting) {
          const targetR = 125;
          const radialForce = (targetR - d) * 0.05;
          w.vx += (dx / d) * radialForce;
          w.vy += (dy / d) * radialForce;
          w.vx += (-dy / d) * 1.0;
          w.vy += (dx / d) * 1.0;
          w.vx *= 0.98; w.vy *= 0.98;
        }
      }
    });

    if (phaseT > 5) {
      floatingWords.filter(w => w.phase === 'drifting').forEach(w => { w.phase = 'winning'; });
    }

    updateWords(dt);
    drawWords();

    if (phaseT > 8 && !waitingForClick) {
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
      narrate('Not new principles. The same ones \u2014 restated, reclaimed.');
    }

  // --- Friction: Vines dissolve, sphere cracks then heals brighter ---
  } else if (phase === 'friction-civil-rights') {
    drawTitle('Civil Rights \u2014 1960s', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / 10);

    if (progress < 0.5) {
      // Phase A: Sphere strains under vines, cracks appear
      const intensity = Math.sin(progress / 0.5 * Math.PI) * 20;
      const jx = (Math.random()-0.5) * intensity * 2;
      const jy = (Math.random()-0.5) * intensity * 2;
      drawSphere(W/2 + jx, H/2 + jy, 95, GOLD, 'Constitutional Government', 1);

      // Vines dissolving
      drawVinesFading(CR_VINES_2, progress, now);

      // Crack lines on sphere
      ctx.save(); ctx.globalAlpha = progress * 2;
      ctx.strokeStyle = '#cc4444'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W/2 - 20 + jx, H/2 - 60 + jy);
      ctx.lineTo(W/2 + 5 + jx, H/2 + jy);
      ctx.lineTo(W/2 - 10 + jx, H/2 + 50 + jy);
      ctx.stroke();
      ctx.restore();

      // Orbiting burn words
      if (phaseT > 0.5 && floatingWords.length === 0) {
        const burnWords = ['Equal Protection', 'Voting Rights', 'Justice', 'I Have a Dream', 'Peaceful Protest', 'Freedom Riders'];
        burnWords.forEach((label, i) => {
          const angle = (i / burnWords.length) * Math.PI * 2 - Math.PI/2;
          const w = makeWord(label, false, '#ffe088');
          w.x = W/2 + Math.cos(angle) * 130;
          w.y = H/2 + Math.sin(angle) * 100;
          w.vx = (-Math.sin(angle)) * 15;
          w.vy = (Math.cos(angle)) * 15;
          w.fontSize = 16; w.baseFontSize = 16;
          w.orbiting = true; w.orbitReady = true;
          w.phase = 'winning';
          floatingWords.push(w);
        });
      }

      // Keep words orbiting
      floatingWords.forEach(w => {
        if (w.orbiting) {
          const dx = w.x - W/2, dy = w.y - H/2;
          const d = Math.sqrt(dx*dx + dy*dy) || 1;
          const targetR = 120;
          const radialForce = (targetR - d) * 0.05;
          w.vx += (dx / d) * radialForce;
          w.vy += (dy / d) * radialForce;
          w.vx += (-dy / d) * 1.2;
          w.vy += (dx / d) * 1.2;
          w.vx *= 0.98; w.vy *= 0.98;
        }
      });

    } else if (progress < 0.7) {
      // Phase B: Sphere strains but holds
      const strainT = (progress - 0.5) / 0.2;
      const pulse = Math.sin(strainT * Math.PI * 3) * 8;
      drawSphere(W/2, H/2, 95 + pulse, GOLD, 'Constitutional Government', 0.85);
    } else {
      // Phase C: Sphere heals brighter with scar
      const repairT = (progress - 0.7) / 0.3;
      const ease = easeInOut(repairT);
      const brightness = ease * 35; // heals brighter than other eras
      drawSphere(W/2, H/2, 95, lighten(GOLD, brightness), 'Constitutional Government', 1);
      if (repairT < 0.9) {
        ctx.save(); ctx.globalAlpha = 0.3 * (1 - repairT);
        ctx.strokeStyle = '#cc6666'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(W/2 - 8, H/2 - 45); ctx.lineTo(W/2 + 5, H/2); ctx.lineTo(W/2 - 5, H/2 + 40); ctx.stroke();
        ctx.restore();
      }
    }

    updateWords(dt);
    drawWords();

    if (progress >= 1 && !waitingForClick) {
      popSeed('Inequality', false);
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
      narrate('The arc of justice bends. The people bend it.');
    }
  }

  endFrame(now);
}

// ========================================
// INPUT
// ========================================
canvas.addEventListener('click', function(e) {
  if (waitingForClick) {
    waitingForClick = false;
    logDwell(phase);
    hintEl.textContent = '';

    if (phase === 'swirl-civil-rights') {
      phase = 'friction-civil-rights'; phaseT = 0;
      floatingWords = [];
    } else if (phase === 'friction-civil-rights') {
      navigateToEra('1975-2000.html');
    }
    return;
  }
});

// Touch support
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (waitingForClick) {
    canvas.dispatchEvent(new MouseEvent('click', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
  }
});

// ========================================
// JUMP TO PHASE (for timeline clicks)
// ========================================
function jumpToPhase(targetId) {
  floatingWords = [];
  waitingForClick = false;
  hintEl.textContent = ''; narrationEl.textContent = '';
  phase = targetId; phaseT = 0;
}

// Build timeline and start
buildTimeline(PHASES);
requestAnimationFrame(render);
</script>
</body>
</html>
