<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Perfect — The Founding (1770–1790)</title>
<style>
  /* CSS is provided by engine.js getSharedCSS() but we inline it here for standalone loading */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  .stage { display: flex; align-items: flex-start; gap: 12px; margin-top: 8px; }
  .side-panel { width: 140px; display: flex; flex-direction: column; gap: 3px; padding-top: 4px; }
  .side-panel .tl-item { padding: 3px 6px; border-radius: 3px; font: 11px/1.3 'Segoe UI', system-ui, sans-serif; color: #ccc; border: 1px solid transparent; white-space: nowrap; transition: all 0.3s; cursor: pointer; }
  .side-panel .tl-item:hover { background: #2a2a4e; color: #fff; }
  .side-panel .tl-item.active { border-color: #fff; color: #fff; font-weight: 700; }
  .side-panel .tl-act-label { font: 700 12px/1.3 'Segoe UI', system-ui, sans-serif; color: #888; padding: 6px 6px 2px; text-transform: uppercase; letter-spacing: 1px; }
  canvas { cursor: pointer; border-radius: 8px; }
  .controls { position: fixed; top: 12px; right: 16px; display: flex; gap: 8px; z-index: 10; }
  .controls button { background: #1a1a2e; border: 1px solid #666; color: #ccc; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .controls button.active { border-color: #d4af37; color: #d4af37; }
  .controls button:hover { border-color: #555; color: #ccc; }
  .narration { margin-top: 14px; text-align: center; font-size: 1rem; color: #b0b0b0; min-height: 28px; max-width: 700px; }
  .hint { margin-top: 6px; font-size: 0.8rem; color: #d4af37; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<div class="controls">
  <button id="audioBtn" onclick="toggleAudio()">Audio Off</button>
</div>

<div class="stage" id="stage">
  <div class="side-panel" id="timeline-left"></div>
  <div id="center-panel">
    <canvas id="c" width="900" height="480"></canvas>
    <div class="narration" id="narration"></div>
    <div class="hint" id="hint">Click to begin</div>
  </div>
  <div class="side-panel" id="timeline-right"></div>
</div>

<script src="engine.js"></script>
<script>
// ========================================
// DATA
// ========================================
const TOWNS = [
  { name: 'Boston', colony: 'MA' },
  { name: 'Philadelphia', colony: 'PA' },
  { name: 'New York', colony: 'NY' },
  { name: 'Williamsburg', colony: 'VA' },
  { name: 'Charleston', colony: 'SC' },
  { name: 'Hartford', colony: 'CT' },
  { name: 'Providence', colony: 'RI' },
  { name: 'Annapolis', colony: 'MD' },
  { name: 'Savannah', colony: 'GA' },
  { name: 'New Bern', colony: 'NC' },
  { name: 'Portsmouth', colony: 'NH' },
  { name: 'Dover', colony: 'DE' },
  { name: 'Perth Amboy', colony: 'NJ' },
];

const COLONIES = [
  'Massachusetts', 'Pennsylvania', 'New York', 'Virginia',
  'South Carolina', 'Connecticut', 'Rhode Island', 'Maryland',
  'Georgia', 'N. Carolina', 'N. Hampshire', 'Delaware', 'New Jersey',
];

const DECONSTRUCT_TREE = {
  label: 'Constitutional Government', color: GOLD, children: [
    { label: 'Branches', color: GOLD, children: [
      { label: 'Congress', color: CORAL, children: [
        { label: 'Senate', color: CORAL, children: [] },
        { label: 'House', color: CORAL, children: [] },
      ]},
      { label: 'Executive', color: GREEN, children: [
        { label: 'President', color: GREEN, children: [] },
        { label: 'Cabinet', color: GREEN, children: [] },
        { label: 'Agencies', color: GREEN, children: [] },
      ]},
      { label: 'Judicial', color: PURPLE, children: [
        { label: 'Supreme Ct', color: PURPLE, children: [] },
        { label: 'Appeals', color: PURPLE, children: [] },
        { label: 'District', color: PURPLE, children: [] },
      ]},
    ]},
    { label: 'Jurisdictions', color: BLUE, children: [
      { label: 'Federal', color: BLUE, children: [] },
      { label: 'States', color: BLUE, children: [] },
      { label: 'Towns', color: BLUE, children: [] },
    ]},
  ]
};

// Founding idea swirl words
const FOUNDING_POSITIVE = [
  { label: 'Liberty', color: '#f0d060' },
  { label: 'Equality', color: '#f0d060' },
  { label: 'Consent', color: '#e8c840' },
  { label: 'Self-Governance', color: '#f0d060' },
  { label: 'Natural Rights', color: '#e8c840' },
  { label: 'Social Contract', color: '#f0d060' },
  { label: 'Common Good', color: '#e8c840' },
  { label: 'Justice', color: '#f0d060' },
  { label: 'Representation', color: '#e8c840' },
];

const FOUNDING_NEGATIVE = [
  { label: 'Tyranny', color: '#ff6666' },
  { label: 'Slavery', color: '#ff5555' },
  { label: 'Property over People', color: '#ffaa55' },
  { label: 'Men Only', color: '#ffbb77' },
  { label: "King's Rule", color: '#ff8888' },
  { label: 'Landed Gentry', color: '#ffcc88' },
];

// ========================================
// LAYOUT FUNCTIONS
// ========================================

// Towns: 3 rows of ~4-5, centered, bigger radius
function scatterTowns() {
  townBalls = [];
  const cx = W / 2, cy = H / 2;
  const cols = 5;
  const spacingX = 130, spacingY = 100;
  const startX = cx - (cols - 1) * spacingX / 2;
  const startY = cy - spacingY;

  TOWNS.forEach((t, i) => {
    const row = Math.floor(i / cols);
    const col = i % cols;
    // Offset odd rows for visual interest
    const rowCount = row < 2 ? cols : TOWNS.length - cols * 2;
    const rowStartX = cx - (Math.min(cols, rowCount) - 1) * spacingX / 2;
    const tx = rowStartX + col * spacingX;
    const ty = startY + row * spacingY;
    const ball = makeBall(cx, cy, 32, t.name, TEAL);
    ball.targetX = tx;
    ball.targetY = ty;
    ball.colony = t.colony;
    townBalls.push(ball);
  });
}

// States: 2 rows of 7 and 6, centered, bigger radius
function placeStates() {
  stateBalls = [];
  const cx = W / 2, cy = H / 2;
  const row1 = 7, row2 = 6;
  const spacingX = 110, spacingY = 110;
  const startY = cy - spacingY / 2;

  COLONIES.forEach((name, i) => {
    let tx, ty;
    if (i < row1) {
      tx = cx - (row1 - 1) * spacingX / 2 + i * spacingX;
      ty = startY;
    } else {
      const j = i - row1;
      tx = cx - (row2 - 1) * spacingX / 2 + j * spacingX;
      ty = startY + spacingY;
    }
    const ball = makeBall(cx, cy, 45, name, BLUE);
    ball.targetX = tx;
    ball.targetY = ty;
    ball.alpha = 0;
    stateBalls.push(ball);
  });
}

function townToStateIndex(colony) {
  const map = { MA: 0, PA: 1, NY: 2, VA: 3, SC: 4, CT: 5, RI: 6, MD: 7, GA: 8, NC: 9, NH: 10, DE: 11, NJ: 12 };
  return map[colony] || 0;
}

// ========================================
// INTERACTIVE SPHERE SYSTEM
// ========================================
function makeInteractiveSphere(treeDef, x, y, r) {
  return {
    x, y, r, label: treeDef.label, color: treeDef.color,
    treeDef, state: 'idle', stateT: 0,
    children: [], parent: null, targetX: x, targetY: y,
    splitOriginX: x, splitOriginY: y,
  };
}

function updateInteractiveSphere(s, dt, now) {
  if (s.state === 'idle') {
    const breathe = Math.sin(now / 700 + s.x * 0.01) * 3;
    drawSphere(s.x, s.y, s.r + breathe, s.color, s.label, 1, s.treeDef.children.length > 0);

  } else if (s.state === 'jitter') {
    s.stateT += dt;
    const progress = Math.min(1, s.stateT / JITTER_DUR);
    const intensity = Math.sin(progress * Math.PI) * 12;
    const jx = (Math.random() - 0.5) * intensity * 2;
    const jy = (Math.random() - 0.5) * intensity * 2;
    drawSphere(s.x + jx, s.y + jy, s.r, s.color, s.label, 1);

    if (progress > 0.3) {
      ctx.save(); ctx.globalAlpha = (progress - 0.3) * 1.4;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(s.x - 5 + jx, s.y - s.r * 0.6 + jy); ctx.lineTo(s.x + 3 + jx, s.y + jy); ctx.lineTo(s.x - 8 + jx, s.y + s.r * 0.5 + jy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x + 10 + jx, s.y - s.r * 0.4 + jy); ctx.lineTo(s.x - 2 + jx, s.y + s.r * 0.2 + jy); ctx.stroke();
      ctx.restore();
    }

    if (progress >= 1) {
      s.state = 'splitting'; s.stateT = 0;
      const childDefs = s.treeDef.children;
      const childR = Math.max(28, s.r * 0.6);
      const targets = computeTargets(s, childDefs.length, childR);
      childDefs.forEach((def, i) => {
        const child = makeInteractiveSphere(def, s.x, s.y, childR);
        child.targetX = targets[i].x; child.targetY = targets[i].y;
        child.splitOriginX = s.x; child.splitOriginY = s.y;
        child.parent = s; child.state = 'appearing'; child.stateT = 0;
        s.children.push(child); spheres.push(child);
      });
      spawnParticles(s.x, s.y, s.color, 12);
    }

  } else if (s.state === 'splitting') {
    s.stateT += dt;
    const progress = Math.min(1, s.stateT / SPLIT_DUR);
    const parentAlpha = 1 - easeInOut(Math.min(1, progress * 3));
    if (parentAlpha > 0) drawSphere(s.x, s.y, s.r * (1 - progress * 0.5), s.color, s.label, parentAlpha);
    if (progress >= 1) { s.state = 'done'; updateHint(); }

  } else if (s.state === 'appearing') {
    const parent = s.parent;
    if (!parent) { s.state = 'idle'; return; }
    const progress = Math.min(1, parent.stateT / SPLIT_DUR);
    const ease = easeOutBack(Math.min(1, progress));
    s.x = lerp(s.splitOriginX, s.targetX, ease);
    s.y = lerp(s.splitOriginY, s.targetY, ease);
    drawSphere(s.x, s.y, s.r * Math.min(1, ease), s.color, s.label, easeInOut(Math.min(1, progress * 2)), s.treeDef.children.length > 0);
    if (progress >= 1) { s.state = 'idle'; s.x = s.targetX; s.y = s.targetY; updateHint(); }
  }
}

function computeTargets(parent, count, childR) {
  const targets = [];
  if (count === 2) {
    targets.push({ x: parent.x - childR * 2.3, y: parent.y });
    targets.push({ x: parent.x + childR * 2.3, y: parent.y });
  } else if (count === 3) {
    targets.push({ x: parent.x, y: parent.y - childR * 2.1 });
    targets.push({ x: parent.x - childR * 1.9, y: parent.y + childR * 1.4 });
    targets.push({ x: parent.x + childR * 1.9, y: parent.y + childR * 1.4 });
  } else {
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI / 2 + (i / count) * Math.PI * 2;
      targets.push({ x: parent.x + Math.cos(angle) * childR * 2.5, y: parent.y + Math.sin(angle) * childR * 2.5 });
    }
  }
  targets.forEach(t => {
    t.x = Math.max(childR + 10, Math.min(W - childR - 10, t.x));
    t.y = Math.max(childR + 40, Math.min(H - childR - 10, t.y));
  });
  return targets;
}

let closingQueued = false;
let leafSpheres = [];

function updateHint() {
  const clickable = spheres.filter(s => s.state === 'idle' && s.treeDef.children.length > 0);
  const pending = spheres.filter(s => s.state === 'appearing' || s.state === 'splitting');
  if (clickable.length > 0 || pending.length > 0) {
    if (clickable.length > 0) hintEl.textContent = 'Click a sphere to deconstruct. Drag to rearrange.';
  } else {
    hintEl.textContent = '';
    if (!closingQueued) {
      closingQueued = true;
      setTimeout(() => {
        if (phase === 'interactive') {
          phase = 'closing'; phaseT = 0;
          leafSpheres = spheres.filter(s => s.state === 'idle');
          leafSpheres.forEach(s => { s.originX = s.x; s.originY = s.y; });
          narrate('A more perfect union. The building continues.');
        }
      }, 1500);
    }
  }
}

// ========================================
// PHASES
// ========================================
const PHASES = [
  { id: 'opening', label: 'Opening' },
  { id: 'swirl-founding', label: 'Idea Swirl' },
  { id: 'condense-founding', label: 'Principles Form' },
  { id: 'form-people', label: 'The People' },
  { id: 'people-ready', label: 'People Ready' },
  { id: 'jitter-people', label: 'Jitter' },
  { id: 'scatter', label: 'Scatter' },
  { id: 'towns', label: 'Colonial Towns' },
  { id: 'coalesce1', label: 'Towns to Colonies' },
  { id: 'states', label: 'Thirteen Colonies' },
  { id: 'coalesce2', label: 'Forge Government' },
  { id: 'gov-arrive', label: 'Government' },
  { id: 'interactive', label: 'Deconstruct' },
  { id: 'closing', label: 'More Perfect' },
  { id: 'post-deconstruct', label: 'Bridge' },
];

phase = 'opening';

// ========================================
// RENDER
// ========================================
function render(now) {
  const dt = beginFrame(now);
  updateTimeline(phase);

  // --- Opening — MBE Quote (two lines, sequential) ---
  if (phase === 'opening') {
    phaseT += dt;
    const line1 = 'The focus of ideas';
    const line2 = 'brings light instantaneously,';
    const line3 = 'whereas a thousand years of human doctrines,';
    const line4 = 'hypotheses, and vague conjectures';
    const line5 = 'emit no such effulgence.';

    // Line 1 types in first
    const line1Chars = Math.min(line1.length, Math.floor(phaseT * 6));
    const line1Done = line1Chars >= line1.length;
    const line1DoneT = line1.length / 6; // time when line1 finishes

    // Lines 2-5 start after line1 + 1s pause
    const subStartT = line1DoneT + 1.0;
    const subText = line2 + ' ' + line3 + ' ' + line4 + ' ' + line5;
    const subChars = line1Done ? Math.min(subText.length, Math.floor((phaseT - subStartT) * 10)) : 0;
    const allDone = subChars >= subText.length;

    // Scale grows from small to full
    const scaleT = Math.min(1, phaseT / 3.5);
    const scale = 0.5 + easeOutBack(scaleT) * 0.5;
    const fontSize = 20 + scale * 14; // 20 → 34px

    // Glow intensifies as text completes
    const glowIntensity = easeInOut(Math.min(1, line1Chars / line1.length));

    // Header — "How darkness is destroyed..." fades in immediately
    const headerAlpha = easeInOut(Math.min(1, phaseT * 1.2));
    ctx.save();
    ctx.globalAlpha = headerAlpha * 0.6;
    ctx.font = '400 15px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#b0b0b0'; ctx.textAlign = 'center';
    ctx.fillText('How darkness is destroyed...', W/2, H/2 - 75);
    ctx.restore();

    // Line 1 — big, gold, italic
    ctx.save();
    ctx.translate(W/2, H/2 - 40);
    ctx.scale(scale, scale);
    ctx.globalAlpha = Math.min(1, phaseT * 1.5) * 0.9;
    ctx.font = 'italic ' + fontSize + 'px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = GOLD; ctx.textAlign = 'center';
    ctx.shadowColor = GOLD; ctx.shadowBlur = glowIntensity * 20;
    ctx.fillText('"' + line1.slice(0, line1Chars) + (line1Done ? '"' : ''), 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Lines 2-5 — smaller, fade in below
    if (subChars > 0) {
      const subAlpha = easeInOut(Math.min(1, (phaseT - subStartT) * 0.8));
      const visible = subText.slice(0, Math.max(0, subChars));
      // Word-wrap into lines
      const words = visible.split(' ');
      const lines = []; let cur = '';
      words.forEach(w => {
        const test = cur ? cur + ' ' + w : w;
        if (test.length > 45 && cur) { lines.push(cur); cur = w; }
        else cur = test;
      });
      if (cur) lines.push(cur);

      ctx.save();
      ctx.globalAlpha = subAlpha * 0.75;
      ctx.font = 'italic 16px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
      lines.forEach((ln, i) => {
        ctx.fillText(ln, W/2, H/2 + 5 + i * 22);
      });
      ctx.restore();
    }

    // Attribution fades in after all text completes
    if (allDone) {
      const attrDelay = subStartT + subText.length / 10;
      const attrAlpha = easeInOut(Math.min(1, (phaseT - attrDelay) * 1.5));
      ctx.save(); ctx.globalAlpha = attrAlpha * 0.5;
      ctx.font = '400 13px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
      ctx.fillText('— Mary Baker Eddy, Science and Health 504:23', W/2, H/2 + 100);
      ctx.restore();
    }

  // --- Idea Swirl — The Enlightenment ---
  } else if (phase === 'swirl-founding') {
    drawTitle('The Enlightenment', 0.5);
    phaseT += dt;

    // Spawn words over first 6 seconds (slower, more readable)
    if (phaseT < 6) {
      const allWords = [...FOUNDING_POSITIVE.map(w=>({...w,positive:true})), ...FOUNDING_NEGATIVE.map(w=>({...w,positive:false}))];
      const spawnInterval = 6 / allWords.length;
      const shouldHave = Math.floor(phaseT / spawnInterval);
      while (floatingWords.length < shouldHave && floatingWords.length < allWords.length) {
        const def = allWords[floatingWords.length];
        floatingWords.push(makeWord(def.label, def.positive, def.color));
      }
    }

    // After 8 seconds, negative words start shrinking
    if (phaseT > 8) {
      floatingWords.filter(w => !w.positive && w.phase === 'drifting').forEach(w => {
        w.phase = 'shrinking';
      });
    }

    // After 9 seconds, positive words start winning
    if (phaseT > 9) {
      floatingWords.filter(w => w.positive && w.phase === 'drifting').forEach(w => {
        w.phase = 'winning';
      });
    }

    // Drop seeds when negative words fade out
    floatingWords.filter(w => !w.positive && w.phase === 'shrinking' && w.alpha < 0.05).forEach(w => {
      if (w.phase !== 'seeding') { w.phase = 'seeding'; dropSeed(w); }
    });

    updateWords(dt);
    drawWords();

    // Once swirl stabilizes (~12s), show click-to-continue
    if (phaseT > 12 && !waitingForClick) {
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
      narrate('Ideas take hold. Not all survive.');
    }

  // --- Condense — Nebula Formation ---
  } else if (phase === 'condense-founding') {
    drawTitle('Principles Form', 0.5);
    phaseT += dt;

    // Fade out individual words
    floatingWords.forEach(w => {
      if (w.positive) w.alpha = Math.max(0, w.alpha - dt * 0.5);
    });
    drawWords();

    updateNebulae(dt);
    drawNebulae(now);

    if (phaseT > 4 && !waitingForClick) {
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
    }

  // --- Form People — Blobs condense into sphere ---
  } else if (phase === 'form-people') {
    drawTitle('The People', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / 3);
    const ease = easeInOut(progress);

    // Condensing nebulae
    nebulae.forEach(n => {
      n.phase = 'condensing';
      n.targetX = W/2; n.targetY = H/2;
    });
    updateNebulae(dt);
    if (progress < 0.8) drawNebulae(now);

    // People sphere fading in
    if (progress > 0.3) {
      const sAlpha = easeInOut((progress - 0.3) * 2);
      const sR = 90 * easeOutBack(Math.min(1, (progress - 0.3) * 1.8));
      drawSphere(W/2, H/2, sR, GOLD, 'The People', sAlpha);
    }

    if (progress >= 1) {
      phase = 'people-ready'; phaseT = 0;
      peopleBall = makeBall(W/2, H/2, 90, 'The People', GOLD);
      nebulae = [];
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
      narrate('The People.');
    }

  // --- People Ready (click to continue) ---
  } else if (phase === 'people-ready') {
    drawTitle('The Origin of American Government', 0.5);
    const breathe = Math.sin(now / 600) * 4;
    drawSphere(peopleBall.x, peopleBall.y, peopleBall.r + breathe, peopleBall.color, peopleBall.label, 1);
    ctx.save(); ctx.globalAlpha = 0.4; ctx.font = '400 14px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
    ctx.fillText('circa 1750', W/2, H/2 + 120); ctx.restore();

  // --- Jitter People (auto-transition) ---
  } else if (phase === 'jitter-people') {
    drawTitle('The Origin of American Government', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / JITTER_DUR);
    const intensity = Math.sin(progress * Math.PI) * 14;
    const jx = (Math.random() - 0.5) * intensity * 2;
    const jy = (Math.random() - 0.5) * intensity * 2;
    drawSphere(peopleBall.x + jx, peopleBall.y + jy, peopleBall.r, peopleBall.color, peopleBall.label, 1);

    if (progress > 0.3) {
      ctx.save(); ctx.globalAlpha = (progress - 0.3) * 1.4;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      const ox = peopleBall.x + jx, oy = peopleBall.y + jy, pr = peopleBall.r;
      ctx.beginPath(); ctx.moveTo(ox - 5, oy - pr * 0.6); ctx.lineTo(ox + 3, oy); ctx.lineTo(ox - 8, oy + pr * 0.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox + 12, oy - pr * 0.4); ctx.lineTo(ox - 2, oy + pr * 0.2); ctx.stroke();
      ctx.restore();
    }

    if (progress >= 1) {
      phase = 'scatter';
      phaseT = 0;
      scatterTowns();
      spawnParticles(peopleBall.x, peopleBall.y, GOLD, 20);
      narrate('The people settled into towns and cities.');
    }

  // --- Scatter into Towns (auto-transition) ---
  } else if (phase === 'scatter') {
    drawTitle('The Origin of American Government', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / 1.5);
    const ease = easeOutBack(Math.min(1, progress));

    const pAlpha = 1 - easeInOut(Math.min(1, progress * 3));
    if (pAlpha > 0) drawSphere(peopleBall.x, peopleBall.y, peopleBall.r * (1 - progress * 0.5), peopleBall.color, peopleBall.label, pAlpha);

    // Ghost label
    if (progress > 0.3) {
      ctx.save(); ctx.globalAlpha = 0.2;
      ctx.font = '400 12px Segoe UI, system-ui, sans-serif'; ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
      ctx.fillText('The People', W / 2, H / 2 - 5); ctx.restore();
    }

    townBalls.forEach(b => {
      b.x = lerp(peopleBall.x, b.targetX, ease);
      b.y = lerp(peopleBall.y, b.targetY, ease);
      drawSphere(b.x, b.y, b.r * Math.min(1, ease), b.color, b.label, easeInOut(Math.min(1, progress * 2)));
    });

    drawParticles();

    if (progress >= 1) {
      phase = 'towns';
      phaseT = 0;
      townBalls.forEach(b => { b.x = b.targetX; b.y = b.targetY; });
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
    }

  // --- Towns — Colonial Capitals (click to continue) ---
  } else if (phase === 'towns') {
    drawTitle('Colonial Capital Cities — circa 1750', 0.5);
    const breathe = Math.sin(now / 700) * 2;

    ctx.save(); ctx.globalAlpha = 0.15; ctx.font = '400 12px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#ccc'; ctx.textAlign = 'center'; ctx.fillText('The People', W / 2, H / 2 - 5); ctx.restore();

    townBalls.forEach(b => drawSphere(b.x, b.y, b.r + breathe, b.color, b.label, 1));

  // --- Coalesce Towns → Colonies (auto, 3.5s) ---
  } else if (phase === 'coalesce1') {
    drawTitle('Towns become Colonies', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / 3.5); // SLOW — 3.5 seconds
    const ease = easeInOut(progress);

    townBalls.forEach(b => {
      const si = townToStateIndex(b.colony);
      const target = stateBalls[si];
      b.x = lerp(b.targetX, target.targetX, ease);
      b.y = lerp(b.targetY, target.targetY, ease);
      drawSphere(b.x, b.y, b.r * (1 - ease * 0.7), b.color, b.label, 1 - ease);
    });

    stateBalls.forEach(s => {
      const p = Math.min(1, progress * 1.3);
      s.x = lerp(W / 2, s.targetX, easeOutBack(p));
      s.y = lerp(H / 2, s.targetY, easeOutBack(p));
      s.alpha = easeInOut(Math.min(1, progress * 1.8));
      drawSphere(s.x, s.y, s.r * Math.min(1, easeOutBack(p)), s.color, s.label, s.alpha);
    });

    if (progress >= 1) {
      phase = 'states';
      phaseT = 0;
      stateBalls.forEach(s => { s.x = s.targetX; s.y = s.targetY; s.alpha = 1; });
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
    }

  // --- Thirteen Colonies (click to continue) ---
  } else if (phase === 'states') {
    drawTitle('The Thirteen Colonies — 1776', 0.5);
    const breathe = Math.sin(now / 700) * 2;
    stateBalls.forEach(s => drawSphere(s.x, s.y, s.r + breathe, s.color, s.label, 1));

  // --- Forge Constitutional Government (auto, 4s) ---
  } else if (phase === 'coalesce2') {
    drawTitle('E Pluribus Unum', 0.5);
    phaseT += dt;
    const progress = Math.min(1, phaseT / 4.0); // SLOW — 4 seconds
    const ease = easeInOut(progress);

    stateBalls.forEach(s => {
      s.x = lerp(s.targetX, W / 2, ease);
      s.y = lerp(s.targetY, H / 2, ease);
      drawSphere(s.x, s.y, s.r * (1 - ease * 0.6), s.color, s.label, 1 - ease * 0.8);
    });

    // Government sphere
    const govAlpha = easeInOut(Math.max(0, (progress - 0.35) * 2.5));
    const govR = 95 * easeOutBack(Math.min(1, Math.max(0, (progress - 0.3) * 1.8)));
    if (govAlpha > 0) {
      drawSphere(W / 2, H / 2, govR, GOLD, 'Constitutional Government', govAlpha, true);
    }

    if (progress > 0.6) {
      ctx.save();
      ctx.globalAlpha = easeInOut((progress - 0.6) * 3) * 0.6;
      ctx.font = '400 14px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = '#d4af37'; ctx.textAlign = 'center';
      ctx.fillText('We the People', W / 2, H / 2 + 115);
      ctx.restore();
    }

    if (progress >= 1) {
      phase = 'gov-arrive';
      phaseT = 0;
      waitingForClick = true;
      hintEl.textContent = 'Click to deconstruct';
    }

  // --- Government Arrived (click to deconstruct) ---
  } else if (phase === 'gov-arrive') {
    drawTitle('The United States Constitutional Government', 0.5);
    const breathe = Math.sin(now / 600) * 4;
    drawSphere(W / 2, H / 2, 95 + breathe, GOLD, 'Constitutional Government', 1, true);

    ctx.save(); ctx.globalAlpha = 0.5; ctx.font = '400 14px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#d4af37'; ctx.textAlign = 'center';
    ctx.fillText('We the People', W / 2, H / 2 + 115); ctx.restore();

  // --- Interactive Deconstruction (user-driven) ---
  } else if (phase === 'interactive') {
    drawTitle('Deconstruction', 0.5);

    // Connection lines
    spheres.forEach(s => {
      if (s.children.length > 0 && s.state === 'done') {
        s.children.forEach(child => {
          if (child.state === 'done' || child.state === 'idle') {
            ctx.save(); ctx.globalAlpha = 0.12;
            ctx.setLineDash([6, 6]); ctx.lineDashOffset = -now / 100;
            ctx.strokeStyle = '#999'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(child.x, child.y); ctx.stroke();
            ctx.setLineDash([]); ctx.restore();
          }
        });
        ctx.save(); ctx.globalAlpha = 0.2; ctx.font = '400 11px Segoe UI, system-ui, sans-serif';
        ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
        ctx.fillText(s.label, s.x, s.y - 8); ctx.restore();
      }
    });

    spheres.forEach(s => updateInteractiveSphere(s, dt, now));
    drawParticles();

  // --- Closing — "A More Perfect Union" ---
  } else if (phase === 'closing') {
    phaseT += dt;
    const progress = Math.min(1, phaseT / 3.5);
    const ease = easeInOut(progress);

    drawTitle('A More Perfect Union', 0.6);

    spheres.forEach(s => {
      if (s.children.length > 0 && s.state === 'done') {
        s.children.forEach(child => {
          ctx.save(); ctx.globalAlpha = 0.08 * (1 - ease);
          ctx.setLineDash([6, 6]); ctx.lineDashOffset = -now / 100;
          ctx.strokeStyle = '#999'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(child.x, child.y); ctx.stroke();
          ctx.setLineDash([]); ctx.restore();
        });
      }
    });

    leafSpheres.forEach(s => {
      s.x = lerp(s.originX, W / 2, ease * 0.6);
      s.y = lerp(s.originY, H / 2, ease * 0.6);
      drawSphere(s.x, s.y, s.r * (1 - ease * 0.5), s.color, s.label, 1 - ease * 0.7);
    });

    if (progress > 0.3) {
      const ta = easeInOut((progress - 0.3) * 2);
      ctx.save(); ctx.globalAlpha = ta * 0.9;
      ctx.font = '700 28px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = GOLD; ctx.textAlign = 'center';
      ctx.fillText('A more perfect union.', W / 2, H / 2 - 15); ctx.restore();

      ctx.save(); ctx.globalAlpha = ta * 0.6;
      ctx.font = '400 16px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = '#b0b0b0'; ctx.textAlign = 'center';
      ctx.fillText('The building continues.', W / 2, H / 2 + 18); ctx.restore();
    }

    if (progress >= 1 && !ttsPlaying) {
      phase = 'post-deconstruct';
      phaseT = 0;
      waitingForClick = true;
      hintEl.textContent = 'Click to continue';
    }

  // --- Post-Deconstruct: Bridge to next era ---
  } else if (phase === 'post-deconstruct') {
    drawTitle('A More Perfect Union', 0.5);
    const breathe = Math.sin(now / 600) * 4;
    drawSphere(W/2, H/2, 95 + breathe, GOLD, 'Constitutional Government', 1);
    ctx.save(); ctx.globalAlpha = 0.5; ctx.font = '400 14px Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = GOLD; ctx.textAlign = 'center';
    ctx.fillText('We the People', W/2, H/2 + 115); ctx.restore();
  }

  endFrame(now);
}

// ========================================
// INPUT
// ========================================
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
}

// Click handler for all phases
canvas.addEventListener('click', function(e) {
  // Start / restart
  if (phase === 'opening') {
    logDwell(phase);
    dwellLog = []; phaseStartTime = Date.now();
    phase = 'swirl-founding'; phaseT = 0;
    floatingWords = []; seeds = []; nebulae = [];
    spheres = []; townBalls = []; stateBalls = []; leafSpheres = [];
    closingQueued = false; dragging = null; waitingForClick = false;
    peopleBall = makeBall(W / 2, H / 2, 90, 'The People', GOLD);
    hintEl.textContent = ''; narrationEl.textContent = '';
    return;
  }

  // Click-to-continue gates
  if (waitingForClick) {
    waitingForClick = false;
    logDwell(phase);
    hintEl.textContent = '';

    if (phase === 'swirl-founding') {
      phase = 'condense-founding'; phaseT = 0;
      // Create 3 nebulae from the winning words
      const nebulaConfigs = [
        { x: W/2 - 150, y: H/2 - 30, r: 80, color: '#f0d060', label: 'Rights of Man' },
        { x: W/2 + 120, y: H/2 - 50, r: 70, color: '#e8c840', label: 'Social Contract' },
        { x: W/2, y: H/2 + 60, r: 75, color: '#f0d060', label: 'Self-Governance' },
      ];
      nebulaConfigs.forEach(c => nebulae.push(makeNebula(c.x, c.y, c.r, c.color, c.label)));
      narrate('Principles form. Still rough. Still unfinished.');
    } else if (phase === 'condense-founding') {
      phase = 'form-people'; phaseT = 0;
      floatingWords = [];
      narrate('');
    } else if (phase === 'people-ready') {
      phase = 'jitter-people'; phaseT = 0;
    } else if (phase === 'towns') {
      phase = 'coalesce1'; phaseT = 0;
      placeStates();
      narrate('The towns coalesced into thirteen colonies.');
    } else if (phase === 'states') {
      phase = 'coalesce2'; phaseT = 0;
      narrate('And they forged a Constitution, creating a Constitutional Government of the people.');
    } else if (phase === 'gov-arrive') {
      phase = 'interactive'; phaseT = 0;
      const root = makeInteractiveSphere(DECONSTRUCT_TREE, W / 2, H / 2, 95);
      spheres.push(root);
      // Auto-start the first split — the click that got us here IS the deconstruct click
      root.state = 'jitter'; root.stateT = 0;
      narrate('Deconstructing.');
    } else if (phase === 'post-deconstruct') {
      navigateToEra('1790-1861.html');
    }
    return;
  }
});

// Interactive: drag + click split
canvas.addEventListener('mousedown', function(e) {
  if (phase !== 'interactive') return;
  const pos = getMousePos(e);
  dragStartX = pos.x; dragStartY = pos.y; wasDrag = false;
  for (let i = spheres.length - 1; i >= 0; i--) {
    const s = spheres[i];
    if (s.state === 'idle' && dist(pos.x, pos.y, s.x, s.y) < s.r) {
      dragging = s;
      dragOffX = s.x - pos.x; dragOffY = s.y - pos.y;
      canvas.style.cursor = 'grabbing';
      return;
    }
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (phase !== 'interactive') return;
  const pos = getMousePos(e);
  if (dragging) {
    if (dist(pos.x, pos.y, dragStartX, dragStartY) > 5) wasDrag = true;
    dragging.x = pos.x + dragOffX; dragging.y = pos.y + dragOffY;
    return;
  }
  let found = false;
  for (let i = spheres.length - 1; i >= 0; i--) {
    if (spheres[i].state === 'idle' && dist(pos.x, pos.y, spheres[i].x, spheres[i].y) < spheres[i].r) {
      canvas.style.cursor = spheres[i].treeDef.children.length > 0 ? 'pointer' : 'grab';
      found = true; break;
    }
  }
  if (!found) canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseup', function() {
  if (dragging && !wasDrag && dragging.treeDef.children.length > 0 && dragging.state === 'idle') {
    dragging.state = 'jitter'; dragging.stateT = 0; hintEl.textContent = '';
  }
  dragging = null; canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseleave', function() { dragging = null; canvas.style.cursor = 'default'; });

// Touch
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const pos = getMousePos(e.touches[0]);

  if (phase === 'opening') {
    canvas.dispatchEvent(new MouseEvent('click', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
    return;
  }
  if (waitingForClick) {
    canvas.dispatchEvent(new MouseEvent('click', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
    return;
  }
  if (phase !== 'interactive') return;

  dragStartX = pos.x; dragStartY = pos.y; wasDrag = false;
  for (let i = spheres.length - 1; i >= 0; i--) {
    const s = spheres[i];
    if (s.state === 'idle' && dist(pos.x, pos.y, s.x, s.y) < s.r) {
      dragging = s;
      dragOffX = s.x - pos.x; dragOffY = s.y - pos.y;
      return;
    }
  }
});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (dragging) {
    const pos = getMousePos(e.touches[0]);
    if (dist(pos.x, pos.y, dragStartX, dragStartY) > 10) wasDrag = true;
    dragging.x = pos.x + dragOffX; dragging.y = pos.y + dragOffY;
  }
});
canvas.addEventListener('touchend', function() {
  if (dragging && !wasDrag && dragging.treeDef.children.length > 0 && dragging.state === 'idle') {
    dragging.state = 'jitter'; dragging.stateT = 0; hintEl.textContent = '';
  }
  dragging = null;
});

// ========================================
// JUMP TO PHASE (for timeline clicks)
// ========================================
function jumpToPhase(targetId) {
  // Reset state for a clean jump
  floatingWords = []; seeds = []; nebulae = [];
  spheres = []; townBalls = []; stateBalls = []; leafSpheres = [];
  closingQueued = false; dragging = null; waitingForClick = false;
  peopleBall = makeBall(W / 2, H / 2, 90, 'The People', GOLD);
  hintEl.textContent = ''; narrationEl.textContent = '';
  phase = targetId; phaseT = 0;
}

// Build timeline and start
buildTimeline(PHASES);
requestAnimationFrame(render);
</script>
